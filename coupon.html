<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coupon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,800;0,900;1,800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1a1adb;
      --blue-dark: #1010b0;
      --blue-light: #2d2df5;
      --white: #ffffff;
      --off: #f4f4f8;
      --txt-mute: #666;
      --notch: 18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 48px;
    }

    /* ── SPLASH ── */
    #splash {
      position: fixed; inset: 0; z-index: 999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      background: var(--blue);
    }
    .sp-ring {
      width: 64px; height: 64px; position: relative;
    }
    .sp-ring::before {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      animation: spin .8s linear infinite;
    }
    .sp-icon { font-size: 28px; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
    .sp-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 4px;
      text-transform: uppercase; color: rgba(255,255,255,.5);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)} }
    @keyframes pop { from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)} }

    /* ── ERROR ── */
    #error-page {
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 40px 24px; text-align: center;
    }
    .err-icon { font-size: 56px; margin-bottom: 20px; }
    .err-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 36px; font-weight: 900; color: var(--blue);
      text-transform: uppercase; margin-bottom: 10px;
    }
    .err-msg { font-size: 14px; color: var(--txt-mute); line-height: 1.7; }

    /* ── CONTENT WRAPPER ── */
    #content {
      display: none;
      width: 100%; max-width: 560px;
    }

    /* ── TICKET ── */
    .ticket {
      width: 100%;
      display: flex;
      flex-direction: column;
      filter: drop-shadow(0 20px 60px rgba(26,26,219,.28)) drop-shadow(0 4px 16px rgba(0,0,0,.18));
      animation: pop .5s cubic-bezier(.34,1.56,.64,1) both;
    }

    /* TOP HALF — blue */
    .tk-top {
      background: var(--blue);
      border-radius: 20px 20px 0 0;
      display: flex;
      min-height: 200px;
      position: relative;
      overflow: hidden;
    }

    .tk-top::before {
      content: '';
      position: absolute; inset: 0;
      background-image: repeating-linear-gradient(
        -55deg,
        rgba(255,255,255,.03) 0px,
        rgba(255,255,255,.03) 1px,
        transparent 1px,
        transparent 22px
      );
      pointer-events: none;
    }

    .tk-left {
      flex: 1.15;
      padding: 32px 28px 32px 32px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative; z-index: 1;
    }

    .brand-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 18px;
    }
    .brand-logo {
      width: 38px; height: 38px; border-radius: 10px;
      background: rgba(255,255,255,.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; overflow: hidden; flex-shrink: 0;
    }
    .brand-logo img { width:100%; height:100%; object-fit:cover; }
    .brand-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; color: rgba(255,255,255,.6);
    }

    .tk-headline {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(34px, 8vw, 48px);
      font-weight: 900; line-height: .95;
      text-transform: uppercase; color: var(--white);
      letter-spacing: -0.5px;
      margin-bottom: 14px;
      text-shadow: 0 2px 12px rgba(0,0,0,.2);
    }

    .tk-sub {
      font-size: 13px; font-weight: 500; letter-spacing: .5px;
      color: rgba(255,255,255,.65); line-height: 1.55;
      text-transform: uppercase;
    }

    .tk-right-blue {
      width: 90px; flex-shrink: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border-left: 1px dashed rgba(255,255,255,.15);
      gap: 6px; padding: 20px 0;
      position: relative; z-index: 1;
    }
    .scan-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px; font-weight: 900; color: rgba(255,255,255,.9);
      line-height: 1;
    }
    .scan-lbl {
      font-size: 8px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,.4);
      text-align: center; line-height: 1.4;
    }

    /* ── PERFORATION ── */
    .perf-strip {
      background: var(--blue);
      display: flex; align-items: center;
      position: relative; height: 30px;
    }
    .notch-l {
      width: var(--notch); height: calc(var(--notch) * 2);
      border-radius: 0 var(--notch) var(--notch) 0;
      background: #e8e8f0; flex-shrink: 0;
    }
    .dots {
      flex: 1; height: 2px;
      background: repeating-linear-gradient(90deg,
        rgba(255,255,255,.25) 0, rgba(255,255,255,.25) 8px,
        transparent 8px, transparent 18px);
      margin: 0 4px;
    }
    .notch-r {
      width: var(--notch); height: calc(var(--notch) * 2);
      border-radius: var(--notch) 0 0 var(--notch);
      background: #e8e8f0; flex-shrink: 0;
    }

    /* BOTTOM HALF — white */
    .tk-bot {
      background: var(--white);
      border-radius: 0 0 20px 20px;
      display: flex;
      min-height: 200px;
    }

    .tk-discount {
      flex: 1;
      padding: 28px 24px 28px 32px;
      display: flex; flex-direction: column;
      justify-content: space-between;
    }

    .disc-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(72px, 18vw, 96px);
      font-weight: 900; line-height: .85;
      color: var(--blue);
      letter-spacing: -3px;
    }
    .disc-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 800;
      letter-spacing: 4px; text-transform: uppercase;
      color: var(--blue); margin-top: 6px;
      display: none;
    }
    .disc-dots {
      display: flex; gap: 4px; margin: 10px 0;
    }
    .disc-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--blue); opacity: .2;
    }
    .disc-dot.on { opacity: 1; }

    .validity-row {
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 8px;
    }
    .validity-ico { font-size: 12px; }
    .validity-txt {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: #999;
    }
    .validity-date { color: var(--blue); }

    .tk-desc {
      font-size: 12px; font-weight: 400;
      color: var(--txt-mute); line-height: 1.6;
      margin-bottom: 16px; display: none;
    }

    /* code */
    .code-row {
      display: flex; align-items: stretch; gap: 0;
      margin-bottom: 12px;
    }
    .code-box {
      flex: 1;
      border: 2px dashed var(--blue);
      border-right: none;
      border-radius: 10px 0 0 10px;
      padding: 10px 14px;
    }
    .code-lbl-sm {
      font-size: 8px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: #aaa; margin-bottom: 3px;
    }
    .code-val {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px; font-weight: 900; letter-spacing: 3px;
      color: var(--blue);
    }
    .cp-btn {
      padding: 10px 16px;
      background: var(--blue);
      border: none; border-radius: 0 10px 10px 0;
      cursor: pointer; color: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .1s;
    }
    .cp-btn:active { transform: scale(.95); }
    .cp-btn svg { width:17px; height:17px; fill:none; stroke:#fff; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }

    /* chips */
    .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 16px; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 10px; font-weight: 600; letter-spacing: .5px;
      text-transform: uppercase;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2); color: rgba(255,255,255,.75);
    }
    .chip.valid   { color: #7fffa0; border-color: rgba(127,255,160,.3); background: rgba(127,255,160,.1); }
    .chip.expired { color: #ffaaaa; border-color: rgba(255,100,100,.3); background: rgba(255,100,100,.1); }
    .chip.web     { color: rgba(255,255,255,.85); border-color: rgba(255,255,255,.25); }

    /* redeem */
    .redeem-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px;
      background: var(--blue);
      color: #fff; border: none; border-radius: 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px; font-weight: 800; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; text-decoration: none;
      transition: background .15s, transform .1s;
    }
    .redeem-btn:hover { background: var(--blue-light); }
    .redeem-btn:active { transform: scale(.98); }
    .redeem-btn svg { width:15px; height:15px; fill:none; stroke:#fff; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; transition:transform .2s; }
    .redeem-btn:hover svg { transform: translateX(4px); }

    /* terms */
    .terms-block {
      background: #f7f7fc;
      border: 1px solid #e8e8f5;
      border-radius: 12px; padding: 13px 15px;
      margin-bottom: 12px;
    }
    .terms-hdr {
      font-size: 9px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: #aaa; margin-bottom: 6px;
    }
    .terms-txt { font-size: 11px; color: #888; line-height: 1.6; }

    /* barcode side */
    .tk-right-white {
      width: 90px; flex-shrink: 0;
      border-left: 2px dashed #e0e0ec;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px 10px; gap: 10px;
    }
    .barcode {
      display: flex; gap: 2px; align-items: flex-end;
      height: 70px;
    }
    .bc-bar { background: #111; border-radius: 1px; }
    .barcode-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 7px; letter-spacing: 1px; color: #bbb;
      text-align: center;
    }
    .bc-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 8px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--blue);
      opacity: .4;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }

    /* address card */
    .addr-card {
      background: var(--white);
      border: 2px solid #e0e0ee;
      border-radius: 16px; padding: 16px 18px;
      display: flex; gap: 13px; align-items: flex-start;
      margin-top: 12px;
      animation: fadeIn .4s ease both; animation-delay: .5s;
    }
    .addr-ico {
      width: 38px; height: 38px; flex-shrink: 0; border-radius: 10px;
      background: rgba(26,26,219,.08);
      display: flex; align-items: center; justify-content: center; font-size: 17px;
    }
    .addr-lbl {
      font-size: 8px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: #bbb; margin-bottom: 5px;
    }
    .addr-txt { font-size: 13px; color: #333; line-height: 1.5; }

    /* footer */
    .footer {
      margin-top: 24px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      animation: fadeIn .4s ease both; animation-delay: .6s;
    }
    .f-line { height: 1px; width: 48px; background: rgba(0,0,0,.12); }
    .f-txt { font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #bbb; }
    .f-dot { width: 3px; height: 3px; border-radius: 50%; background: #ccc; }

    /* toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: var(--blue); color: #fff;
      display: flex; align-items: center; gap: 10px;
      padding: 11px 22px; border-radius: 40px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase;
      pointer-events: none; white-space: nowrap; z-index: 9999;
      transition: transform .38s cubic-bezier(.34,1.56,.64,1), opacity .38s;
      opacity: 0; box-shadow: 0 8px 30px rgba(26,26,219,.4);
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-ring">
    <div class="sp-icon">🎟️</div>
  </div>
  <div class="sp-label">Loading offer</div>
</div>

<!-- ERROR -->
<div id="error-page">
  <div class="err-icon">🎟️</div>
  <div class="err-title">Coupon Not Found</div>
  <div class="err-msg">This coupon link is invalid or has been removed.<br/>Please contact the store for assistance.</div>
</div>

<!-- CONTENT -->
<div id="content">

  <div class="ticket">

    <!-- TOP: blue -->
    <div class="tk-top">
      <div class="tk-left">
        <div>
          <div class="brand-row">
            <div class="brand-logo" id="brand-logo">
              <span id="logo-fb">🎟️</span>
              <img id="logo-img" src="" alt="" style="display:none"/>
            </div>
            <div class="brand-name" id="co-name"></div>
          </div>
          <div class="tk-headline" id="headline">Special Offer</div>
          <div class="tk-sub" id="tk-sub"></div>
        </div>
        <div class="chips" id="chips"></div>
      </div>

      <div class="tk-right-blue" id="scan-panel" style="display:none">
        <div class="scan-num" id="scan-num"></div>
        <div class="scan-lbl">Total<br>Scans</div>
      </div>
    </div>

    <!-- PERFORATION -->
    <div class="perf-strip">
      <div class="notch-l"></div>
      <div class="dots"></div>
      <div class="notch-r"></div>
    </div>

    <!-- BOTTOM: white -->
    <div class="tk-bot">
      <div class="tk-discount">
        <div>
          <div class="disc-value" id="disc-value"></div>
          <div class="disc-label" id="disc-label">Only For You</div>
          <div class="disc-dots" id="disc-dots"></div>
          <div class="tk-desc" id="tk-desc"></div>
        </div>

        <div>
          <div class="terms-block" id="terms-block" style="display:none">
            <div class="terms-hdr">Terms &amp; Conditions</div>
            <div class="terms-txt" id="terms-txt"></div>
          </div>

          <div id="code-block" style="margin-bottom:12px">
            <div class="code-row">
              <div class="code-box">
                <div class="code-lbl-sm">Coupon Code</div>
                <div class="code-val" id="code-val">——</div>
              </div>
              <button class="cp-btn" id="cp-btn" onclick="copyCode()">
                <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              </button>
            </div>
          </div>

          <div id="redeem-wrap" style="display:none">
            <a class="redeem-btn" id="redeem-btn" href="#" target="_blank" rel="noopener">
              Redeem Now
              <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </a>
          </div>
        </div>
      </div>

      <!-- Barcode panel -->
      <div class="tk-right-white">
        <div class="barcode" id="barcode"></div>
        <div class="barcode-num" id="barcode-num"></div>
        <div class="bc-badge">QRPulse</div>
      </div>
    </div>

  </div>

  <!-- Address -->
  <div class="addr-card" id="addr-card" style="display:none">
    <div class="addr-ico">📍</div>
    <div>
      <div class="addr-lbl">Find Us At</div>
      <div class="addr-txt" id="addr-txt"></div>
    </div>
  </div>

  <div class="footer">
    <div class="f-line"></div>
    <div class="f-dot"></div>
    <div class="f-txt">QRPulse</div>
    <div class="f-dot"></div>
    <div class="f-line"></div>
  </div>

</div>

<div id="toast">✓ Copied!</div>

<script>
  const SUPA_URL = 'https://huuamwhzydfhqziniqnf.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1dWFtd2h6eWRmaHF6aW5pcW5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MjAxOTUsImV4cCI6MjA4OTQ5NjE5NX0.-tTpabRI1b4enlUp8uIXMwmgGv2CLdFgE3vBk01Ye3Y';
  const slug = new URLSearchParams(location.search).get('id');

  function genBarcode(seed) {
    const bars = [];
    let h = 5381;
    for (let i = 0; i < seed.length; i++) h = ((h << 5) + h) ^ seed.charCodeAt(i);
    for (let i = 0; i < 26; i++) {
      h = Math.imul(h ^ (h >>> 16), 0x45d9f3b);
      h ^= h >>> 15;
      const w = (Math.abs(h) % 3) + 1;
      const ht = (Math.abs(h >> 2) % 38) + 28;
      bars.push({ w, ht });
    }
    return bars;
  }

  async function loadCoupon() {
    if (!slug) { showError(); return; }
    try {
      const res = await fetch(
        `${SUPA_URL}/rest/v1/coupons?slug=eq.${encodeURIComponent(slug)}&select=*&limit=1`,
        { headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` } }
      );
      if (!res.ok) { showError(); return; }
      const rows = await res.json();
      if (!rows?.length) { showError(); return; }
      render(rows[0]);
    } catch(e) { console.error(e); showError(); }
  }

  function render(d) {
    if (d.primary_color) {
      document.documentElement.style.setProperty('--blue', d.primary_color);
      document.documentElement.style.setProperty('--blue-light', d.button_color || d.primary_color);
    }

    if (d.logo_url) {
      const li = document.getElementById('logo-img');
      li.src = d.logo_url; li.style.display = 'block';
      document.getElementById('logo-fb').style.display = 'none';
    }

    document.getElementById('co-name').textContent = d.company || '';
    document.getElementById('headline').textContent = d.headline || 'Special Offer';

    // Extract discount value for big number display
    const match = (d.headline || '').match(/(\d+[\d.]*\s*[%$€£]?|[%$€£]\s*\d+[\d.]*)/i);
    const discEl = document.getElementById('disc-value');
    const discLbl = document.getElementById('disc-label');
    if (match) {
      discEl.textContent = match[0].trim();
      discLbl.style.display = 'block';
    } else {
      discEl.textContent = '✦';
      discEl.style.fontSize = '60px';
    }

    // Dots
    const dotsEl = document.getElementById('disc-dots');
    for (let i = 0; i < 14; i++) {
      const dot = document.createElement('div');
      dot.className = 'disc-dot' + (i < 3 ? ' on' : '');
      dotsEl.appendChild(dot);
    }

    if (d.description) {
      const el = document.getElementById('tk-desc');
      el.textContent = d.description; el.style.display = 'block';
    }

    if (d.scan_count > 0) {
      document.getElementById('scan-panel').style.display = 'flex';
      document.getElementById('scan-num').textContent = Number(d.scan_count).toLocaleString();
    }

    const code = (d.coupon_name || '').toUpperCase();
    window._code = code;
    if (code) {
      document.getElementById('code-val').textContent = code;
    } else {
      document.getElementById('code-block').style.display = 'none';
    }

    const chips = document.getElementById('chips');
    if (d.valid_until) {
      const exp = new Date(d.valid_until);
      const isExp = exp < new Date();
      const lbl = exp.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
      chips.innerHTML += `<div class="chip ${isExp?'expired':'valid'}">${isExp?'✕ Expired':'✓ Valid until '+lbl}</div>`;

      // Validity on white panel
      const vr = document.createElement('div');
      vr.className = 'validity-row';
      vr.innerHTML = `<span class="validity-ico">🗓</span>
        <span class="validity-txt">Validity: <span class="validity-date">${lbl}</span></span>`;
      dotsEl.after(vr);
    }
    if (d.website_url) {
      const dom = d.website_url.replace(/^https?:\/\//,'').split('/')[0];
      chips.innerHTML += `<div class="chip web">🌐 ${dom}</div>`;
    }

    if (d.terms_conditions?.trim()) {
      document.getElementById('terms-block').style.display = 'block';
      document.getElementById('terms-txt').textContent = d.terms_conditions;
    }

    if (d.address?.trim()) {
      document.getElementById('addr-card').style.display = 'flex';
      document.getElementById('addr-txt').textContent = d.address;
    }

    if (d.website_url) {
      const btn = document.getElementById('redeem-btn');
      btn.href = d.website_url.startsWith('http') ? d.website_url : 'https://'+d.website_url;
      document.getElementById('redeem-wrap').style.display = 'block';
    }

    // Barcode
    const barsData = genBarcode(code || slug || 'qrpulse');
    const bcEl = document.getElementById('barcode');
    barsData.forEach(b => {
      const bar = document.createElement('div');
      bar.className = 'bc-bar';
      bar.style.width = b.w + 'px';
      bar.style.height = b.ht + 'px';
      bcEl.appendChild(bar);
    });
    document.getElementById('barcode-num').textContent = (code || 'XXXXXX').substring(0, 8);

    document.title = `${code||'Offer'} — ${d.company||'Coupon'}`;
    setTimeout(showContent, 1100);
  }

  function showContent() {
    const sp = document.getElementById('splash');
    sp.style.transition = 'opacity .45s ease';
    sp.style.opacity = '0';
    setTimeout(() => {
      sp.style.display = 'none';
      document.getElementById('content').style.display = 'block';
    }, 450);
  }

  function showError() {
    document.getElementById('splash').style.display = 'none';
    document.getElementById('error-page').style.display = 'flex';
  }

  function copyCode() {
    const code = window._code;
    if (!code) return;
    navigator.clipboard.writeText(code).catch(() => {
      const el = document.createElement('textarea');
      el.value = code; document.body.appendChild(el);
      el.select(); document.execCommand('copy');
      document.body.removeChild(el);
    });
    const btn = document.getElementById('cp-btn');
    btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><polyline points="20 6 9 17 4 12"/></svg>`;
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => {
      btn.innerHTML = `<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
      toast.classList.remove('show');
    }, 2200);
  }

  loadCoupon();
</script>
</body>
</html>
