<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coupon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:   #E84393;
      --secondary: #FF6B35;
      --bg:        #0f0f13;
      --card:      #1a1a24;
      --text:      #f5f5f7;
      --muted:     #888899;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── SPLASH ── */
    #splash {
      position: fixed; inset: 0; z-index: 999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      background: var(--bg);
    }
    #splash-icon { font-size: 64px; line-height: 1; }
    #splash-logo {
      width: 96px; height: 96px; border-radius: 20px;
      object-fit: contain; display: none;
      box-shadow: 0 0 40px rgba(232,67,147,0.4);
    }
    .pulse-ring {
      width: 44px; height: 44px; border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--primary);
      border-right-color: var(--secondary);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CONTENT ── */
    #content { display: none; padding-bottom: 60px; }

    /* ── HERO ── */
    .hero {
      position: relative; width: 100%; height: 220px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      overflow: hidden;
    }
    .hero-img {
      width: 100%; height: 100%; object-fit: cover;
      position: absolute; inset: 0;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom,
        rgba(15,15,19,.1) 0%, rgba(15,15,19,.65) 100%);
    }
    .hero-logo {
      position: absolute; bottom: -32px; left: 24px;
      width: 64px; height: 64px; border-radius: 16px;
      object-fit: contain; border: 3px solid var(--card);
      background: var(--card);
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }
    .no-logo-badge {
      position: absolute; bottom: -32px; left: 24px;
      width: 64px; height: 64px; border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; border: 3px solid var(--card);
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }

    /* ── BODY ── */
    .body { padding: 0 20px; }
    .company-row {
      margin-top: 48px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .company-name {
      font-family: 'Syne', sans-serif;
      font-size: 18px; font-weight: 700; color: var(--text);
    }
    .scan-badge {
      font-size: 11px; color: var(--muted);
      background: rgba(255,255,255,.06);
      border-radius: 20px; padding: 4px 10px;
    }

    /* ── COUPON CARD ── */
    .coupon-card {
      margin: 20px 0; background: var(--card);
      border-radius: 20px; overflow: hidden; position: relative;
    }
    .coupon-card::before, .coupon-card::after {
      content: ''; position: absolute; top: 50%; transform: translateY(-50%);
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--bg); z-index: 2;
    }
    .coupon-card::before { left: -14px; }
    .coupon-card::after  { right: -14px; }

    .coupon-top {
      padding: 28px 28px 22px;
      background: linear-gradient(135deg,
        rgba(232,67,147,0.18), rgba(255,107,53,0.12));
      position: relative;
    }
    .coupon-top::after {
      content: ''; position: absolute; top: -40px; right: -40px;
      width: 140px; height: 140px; border-radius: 50%;
      background: radial-gradient(circle,
        rgba(232,67,147,0.25), transparent 70%);
      pointer-events: none;
    }
    .offer-tag {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--primary); margin-bottom: 8px;
    }
    .headline-text {
      font-family: 'Syne', sans-serif;
      font-size: 26px; font-weight: 800; line-height: 1.2;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tear-line {
      height: 1px; margin: 0 28px;
      background: repeating-linear-gradient(90deg,
        rgba(255,255,255,.15) 0px, rgba(255,255,255,.15) 8px,
        transparent 8px, transparent 16px);
    }

    .coupon-bottom { padding: 18px 28px 24px; }

    .code-wrap {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px;
    }
    .code-box {
      flex: 1;
      border: 2px dashed rgba(232,67,147,0.55);
      border-radius: 12px; padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,.03);
    }
    .code-text {
      font-family: 'Syne', sans-serif;
      font-size: 22px; font-weight: 700; letter-spacing: 3px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .copy-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 16px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer;
      white-space: nowrap; transition: opacity .2s, transform .15s;
    }
    .copy-btn:active { transform: scale(.96); }
    .copy-btn.copied { opacity: .7; }

    .meta-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .meta-chip {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.06); border-radius: 20px;
      padding: 6px 12px; font-size: 12px; color: var(--muted);
    }

    .description {
      font-size: 13px; color: var(--muted);
      line-height: 1.65; margin-bottom: 16px;
    }

    .terms-box {
      background: rgba(255,255,255,.04); border-radius: 12px;
      padding: 14px 16px; margin-bottom: 16px;
    }
    .terms-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
    }
    .terms-text { font-size: 12px; color: var(--muted); line-height: 1.6; }

    .address-box {
      display: flex; align-items: flex-start; gap: 10px;
      background: rgba(255,255,255,.04); border-radius: 12px;
      padding: 14px 16px; margin-bottom: 16px;
    }
    .address-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 4px;
    }
    .address-text { font-size: 13px; color: var(--text); line-height: 1.5; }

    .redeem-btn {
      display: block; width: 100%; padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff; border: none; border-radius: 14px;
      font-family: 'Syne', sans-serif; font-size: 16px;
      font-weight: 700; letter-spacing: .5px;
      cursor: pointer; text-align: center; text-decoration: none;
      transition: opacity .2s, transform .15s;
      box-shadow: 0 8px 24px rgba(232,67,147,0.35);
    }
    .redeem-btn:active { transform: scale(.98); opacity: .9; }

    .footer {
      margin-top: 28px; text-align: center;
      font-size: 12px; color: rgba(255,255,255,.2);
    }

    /* ── ERROR ── */
    #error-page {
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 40px 24px; text-align: center;
    }
    .error-icon { font-size: 56px; margin-bottom: 16px; }
    .error-title {
      font-family: 'Syne', sans-serif; font-size: 24px;
      font-weight: 700; color: var(--text); margin-bottom: 10px;
    }
    .error-msg { font-size: 14px; color: var(--muted); line-height: 1.6; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff; padding: 12px 24px; border-radius: 40px;
      font-size: 14px; font-weight: 600; opacity: 0;
      transition: opacity .3s; pointer-events: none; white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- ══ SPLASH ════════════════════════════════════════════════ -->
<div id="splash">
  <div id="splash-icon">🎟️</div>
  <img id="splash-logo" src="" alt="" />
  <div class="pulse-ring"></div>
</div>

<!-- ══ ERROR ══════════════════════════════════════════════════ -->
<div id="error-page">
  <div class="error-icon">🎟️</div>
  <div class="error-title">Coupon Not Found</div>
  <div class="error-msg">
    This coupon link is invalid or has been removed.<br/>
    Please contact the store for assistance.
  </div>
</div>

<!-- ══ CONTENT ════════════════════════════════════════════════ -->
<div id="content">
  <div class="hero">
    <img id="hero-img" src="" alt="" class="hero-img" style="display:none" />
    <div class="hero-overlay"></div>
    <div class="no-logo-badge" id="no-logo-badge">🎟️</div>
    <img id="hero-logo" src="" alt="logo" class="hero-logo" style="display:none" />
  </div>

  <div class="body">
    <div class="company-row">
      <div class="company-name" id="company-name"></div>
      <div class="scan-badge"   id="scan-badge"></div>
    </div>

    <div class="coupon-card">
      <div class="coupon-top">
        <div class="offer-tag">🎟️ Exclusive Offer</div>
        <div class="headline-text" id="headline-text">Loading…</div>
      </div>

      <div class="tear-line"></div>

      <div class="coupon-bottom">
        <div class="code-wrap" id="code-wrap">
          <div class="code-box">
            <div class="code-text" id="coupon-code">——</div>
          </div>
          <button class="copy-btn" id="copy-btn" onclick="copyCode()">
            <span>📋</span> Copy
          </button>
        </div>

        <div class="meta-row" id="meta-row"></div>
        <div class="description" id="description"></div>

        <div class="terms-box" id="terms-box" style="display:none">
          <div class="terms-label">Terms &amp; Conditions</div>
          <div class="terms-text" id="terms-text"></div>
        </div>

        <div class="address-box" id="address-box" style="display:none">
          <span style="font-size:18px">📍</span>
          <div>
            <div class="address-label">Find Us At</div>
            <div class="address-text" id="address-text"></div>
          </div>
        </div>

        <a class="redeem-btn" id="redeem-btn" href="#"
           target="_blank" rel="noopener" style="display:none">
          Redeem Now →
        </a>
      </div>
    </div>

    <div class="footer">Powered by QRPulse</div>
  </div>
</div>

<div id="toast">✅ Code copied!</div>

<script>
  // ══════════════════════════════════════════════════════════════
  //  SUPABASE CREDENTIALS
  // ══════════════════════════════════════════════════════════════
  const SUPA_URL = 'https://huuamwhzydfhqziniqnf.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1dWFtd2h6eWRmaHF6aW5pcW5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MjAxOTUsImV4cCI6MjA4OTQ5NjE5NX0.-tTpabRI1b4enlUp8uIXMwmgGv2CLdFgE3vBk01Ye3Y';

  // Get ?id= from URL
  const slug = new URLSearchParams(location.search).get('id');

  // ── FETCH ─────────────────────────────────────────────────────
  async function loadCoupon() {
    if (!slug) { showError(); return; }
    try {
      const res = await fetch(
        `${SUPA_URL}/rest/v1/coupons?slug=eq.${encodeURIComponent(slug)}&select=*&limit=1`,
        {
          headers: {
            'apikey':        SUPA_KEY,
            'Authorization': `Bearer ${SUPA_KEY}`,
            'Content-Type':  'application/json'
          }
        }
      );
      if (!res.ok) { showError(); return; }
      const rows = await res.json();
      if (!rows || rows.length === 0) { showError(); return; }
      render(rows[0]);
    } catch (err) {
      console.error('Fetch error:', err);
      showError();
    }
  }

  // ── RENDER ────────────────────────────────────────────────────
  function render(d) {

    // Colors
    if (d.primary_color) {
      document.documentElement.style.setProperty('--primary',   d.primary_color);
      document.documentElement.style.setProperty('--secondary', d.button_color || d.primary_color);
    }

    // Splash logo
    if (d.logo_url) {
      const sl = document.getElementById('splash-logo');
      sl.src = d.logo_url;
      sl.style.display = 'block';
      document.getElementById('splash-icon').style.display = 'none';
    }

    // Hero banner
    if (d.banner_url) {
      const hi = document.getElementById('hero-img');
      hi.src = d.banner_url;
      hi.style.display = 'block';
    }

    // Hero logo badge
    if (d.logo_url) {
      const hl = document.getElementById('hero-logo');
      hl.src = d.logo_url;
      hl.style.display = 'block';
      document.getElementById('no-logo-badge').style.display = 'none';
    }

    // Company
    document.getElementById('company-name').textContent = d.company || '';

    // Scan count
    if (d.scan_count > 0) {
      document.getElementById('scan-badge').textContent =
        `${Number(d.scan_count).toLocaleString()} scans`;
    }

    // Headline
    document.getElementById('headline-text').textContent =
      d.headline || 'Special Offer';

    // Coupon code
    const code = (d.coupon_name || '').toUpperCase();
    document.getElementById('coupon-code').textContent = code || '—';
    window._couponCode = code;
    if (!code) document.getElementById('code-wrap').style.display = 'none';

    // Meta — expiry
    const metaRow = document.getElementById('meta-row');
    if (d.valid_until) {
      const exp   = new Date(d.valid_until);
      const isExp = exp < new Date();
      const lbl   = exp.toLocaleDateString('en-IN',
        { day: 'numeric', month: 'short', year: 'numeric' });
      metaRow.innerHTML +=
        `<div class="meta-chip" style="color:${isExp ? '#ff6b6b' : '#6bcb77'}">
           <span>${isExp ? '❌' : '✅'}</span>
           ${isExp ? 'Expired' : 'Valid until'} ${lbl}
         </div>`;
    }

    // Meta — website domain
    if (d.website_url) {
      const domain = d.website_url.replace(/^https?:\/\//, '').split('/')[0];
      metaRow.innerHTML +=
        `<div class="meta-chip"><span>🌐</span> ${domain}</div>`;
    }

    // Description
    if (d.description) {
      document.getElementById('description').textContent = d.description;
    }

    // Terms
    if (d.terms_conditions && d.terms_conditions.trim()) {
      document.getElementById('terms-box').style.display = 'block';
      document.getElementById('terms-text').textContent  = d.terms_conditions;
    }

    // Address
    if (d.address && d.address.trim()) {
      document.getElementById('address-box').style.display = 'flex';
      document.getElementById('address-text').textContent  = d.address;
    }

    // Redeem button
    if (d.website_url) {
      const btn = document.getElementById('redeem-btn');
      btn.href = d.website_url.startsWith('http')
        ? d.website_url
        : 'https://' + d.website_url;
      btn.style.display = 'block';
    }

    // Page title
    document.title = `${code || 'Coupon'} — ${d.company || 'Offer'}`;

    // Show content after splash
    setTimeout(showContent, 1100);
  }

  // ── HELPERS ───────────────────────────────────────────────────
  function showContent() {
    const splash  = document.getElementById('splash');
    const content = document.getElementById('content');
    splash.style.transition = 'opacity .4s';
    splash.style.opacity = '0';
    setTimeout(() => {
      splash.style.display  = 'none';
      content.style.display = 'block';
    }, 400);
  }

  function showError() {
    document.getElementById('splash').style.display     = 'none';
    document.getElementById('error-page').style.display = 'flex';
  }

  function copyCode() {
    const code = window._couponCode;
    if (!code) return;
    navigator.clipboard.writeText(code).catch(() => {
      const el = document.createElement('textarea');
      el.value = code;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
    });
    const btn   = document.getElementById('copy-btn');
    const toast = document.getElementById('toast');
    btn.innerHTML = '✅ Copied!';
    btn.classList.add('copied');
    toast.classList.add('show');
    setTimeout(() => {
      btn.innerHTML = '<span>📋</span> Copy';
      btn.classList.remove('copied');
      toast.classList.remove('show');
    }, 2200);
  }

  // Boot
  loadCoupon();
</script>
</body>
</html>
