<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coupon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --p:    #E84393;
      --s:    #FF6B35;
      --bg:   #08080f;
      --card: #111118;
      --c2:   #18181f;
      --txt:  #f0f0f5;
      --mut:  #666677;
      --ln:   rgba(255,255,255,0.06);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      overflow-x: hidden;
    }
    /* noise */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      opacity: 0.5;
    }

    /* ── ANIMATIONS ── */
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes pulse   { 0%,100%{opacity:.35}50%{opacity:1} }
    @keyframes fadeUp  { from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)} }
    @keyframes scaleIn { from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)} }
    @keyframes shimmer { 0%{background-position:-200% center}100%{background-position:200% center} }
    @keyframes glow    { 0%,100%{box-shadow:0 8px 32px rgba(232,67,147,.25)}50%{box-shadow:0 8px 48px rgba(232,67,147,.5),0 0 80px rgba(255,107,53,.12)} }
    @keyframes float   { 0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)} }
    @keyframes bdAnim  { 0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%} }

    /* ── SPLASH ── */
    #splash {
      position: fixed; inset: 0; z-index: 999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 22px;
      background: var(--bg);
    }
    .sp-ring {
      position: relative; width: 76px; height: 76px;
    }
    .sp-ring::before {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--p); border-right-color: var(--s);
      animation: spin .9s linear infinite;
    }
    .sp-ring::after {
      content: ''; position: absolute; inset: 10px; border-radius: 50%;
      border: 1px solid rgba(232,67,147,.18);
    }
    #sp-icon {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      font-size: 26px; line-height: 1;
    }
    #sp-logo-wrap {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 42px; height: 42px; border-radius: 10px;
      overflow: hidden; display: none;
    }
    #sp-logo-wrap img { width:100%; height:100%; object-fit:contain; }
    .sp-label {
      font-size: 10px; font-weight: 500; letter-spacing: 3px;
      text-transform: uppercase; color: var(--mut);
      animation: pulse 1.5s ease-in-out infinite;
    }

    /* ── ERROR ── */
    #error-page {
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 40px 24px;
      text-align: center; position: relative; z-index: 1;
    }
    .err-orb {
      width: 110px; height: 110px; border-radius: 50%;
      background: radial-gradient(circle, rgba(232,67,147,.12), transparent 70%);
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }
    .err-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px; font-weight: 700;
      margin-bottom: 10px;
    }
    .err-msg { font-size: 14px; color: var(--mut); line-height: 1.7; font-weight: 300; }

    /* ── CONTENT ── */
    #content {
      display: none; position: relative; z-index: 1;
      max-width: 480px; margin: 0 auto;
      padding-bottom: 80px;
    }

    /* ── HERO ── */
    .hero {
      position: relative; width: 100%; height: 265px; overflow: hidden;
      background: linear-gradient(135deg, #1a0a14 0%, #0a0a1c 100%);
    }
    .hero-img {
      width: 100%; height: 100%; object-fit: cover;
      position: absolute; inset: 0; opacity: .65;
    }
    .hero-grad {
      position: absolute; inset: 0;
      background: linear-gradient(180deg,
        rgba(8,8,15,0) 0%, rgba(8,8,15,.25) 40%, rgba(8,8,15,.97) 100%);
    }
    .hero-glow {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 75% 20%,
        rgba(232,67,147,.18) 0%, transparent 65%);
    }
    .orb {
      position: absolute; border-radius: 50%;
      pointer-events: none; filter: blur(48px);
    }
    .orb1 {
      width: 200px; height: 200px; top: -70px; right: -50px;
      background: radial-gradient(circle, rgba(232,67,147,.28), transparent);
      animation: float 7s ease-in-out infinite;
    }
    .orb2 {
      width: 130px; height: 130px; bottom: 10px; left: -30px;
      background: radial-gradient(circle, rgba(255,107,53,.22), transparent);
      animation: float 9s ease-in-out infinite reverse;
    }
    .hero-badge {
      position: absolute; top: 16px; right: 16px;
      background: rgba(8,8,15,.72); backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,.08); border-radius: 20px;
      padding: 5px 13px; font-size: 10px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,.4);
      animation: fadeUp .5s ease both; animation-delay: .8s;
    }
    .logo-wrap {
      position: absolute; bottom: -30px; left: 22px;
      width: 60px; height: 60px; border-radius: 16px;
      background: var(--c2);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,.55);
      overflow: hidden;
      animation: scaleIn .5s ease both; animation-delay: .4s;
    }
    .logo-wrap::before {
      content: ''; position: absolute; inset: -1px; border-radius: 17px;
      background: linear-gradient(135deg, var(--p), var(--s));
      z-index: -1; opacity: .55;
    }
    .logo-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      position: absolute; inset: 0;
    }

    /* ── HEADER ── */
    .hdr {
      padding: 46px 22px 0;
      animation: fadeUp .5s ease both; animation-delay: .25s;
    }
    .hdr-row {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 10px;
    }
    .co-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 23px; font-weight: 700; line-height: 1.2;
    }
    .scan-pill {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 20px; padding: 4px 11px;
      font-size: 10px; font-weight: 500; color: var(--mut);
      white-space: nowrap; flex-shrink: 0;
    }
    .s-dot {
      width: 5px; height: 5px; border-radius: 50%; background: #6bcb77;
      animation: pulse 2s ease-in-out infinite;
    }

    /* ── COUPON CARD ── */
    .c-wrap {
      margin: 20px 14px 0; position: relative;
      animation: fadeUp .5s ease both; animation-delay: .4s;
    }
    .c-border {
      position: absolute; inset: -1px; border-radius: 26px;
      background: linear-gradient(90deg,
        rgba(232,67,147,.7), rgba(255,107,53,.7),
        rgba(232,67,147,.2), rgba(255,107,53,.7));
      background-size: 300% 300%;
      animation: bdAnim 4s ease infinite; z-index: 0;
    }
    .c-card {
      position: relative; z-index: 1;
      background: var(--card); border-radius: 25px; overflow: hidden;
    }
    .c-top {
      padding: 26px 24px 22px; position: relative; overflow: hidden;
      background: linear-gradient(135deg,
        rgba(232,67,147,.09) 0%, rgba(255,107,53,.04) 100%);
    }
    .c-top-glow {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 100% 0%,
        rgba(232,67,147,.14) 0%, transparent 60%);
      pointer-events: none;
    }
    .offer-tag {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 9px; font-weight: 700;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--p); margin-bottom: 11px;
    }
    .offer-tag-dot {
      width: 4px; height: 4px; border-radius: 50%; background: var(--p);
    }
    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px; font-weight: 700; line-height: 1.12;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,.72) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* perforated divider */
    .perf { position: relative; padding: 0; }
    .perf::before, .perf::after {
      content: ''; position: absolute; top: 50%; transform: translateY(-50%);
      width: 24px; height: 24px; border-radius: 50%; background: var(--bg); z-index: 2;
    }
    .perf::before { left: -12px; }
    .perf::after  { right: -12px; }
    .perf-line {
      height: 1px; margin: 0 20px;
      background: repeating-linear-gradient(90deg,
        rgba(255,255,255,.08) 0, rgba(255,255,255,.08) 6px,
        transparent 6px, transparent 14px);
    }

    .c-bot { padding: 20px 24px 24px; }

    /* code */
    .code-lbl {
      font-size: 9px; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--mut); margin-bottom: 8px;
    }
    .code-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
    }
    .code-pill {
      flex: 1; background: rgba(255,255,255,.04);
      border: 1px dashed rgba(232,67,147,.38);
      border-radius: 13px; padding: 13px 16px;
    }
    .code-val {
      font-size: 21px; font-weight: 700; letter-spacing: 3px;
      background: linear-gradient(90deg, var(--p) 0%, var(--s) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }
    .cp-btn {
      width: 50px; height: 50px; flex-shrink: 0;
      border-radius: 13px; border: none; cursor: pointer;
      background: linear-gradient(135deg, var(--p), var(--s));
      color: #fff; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, opacity .2s;
      box-shadow: 0 4px 20px rgba(232,67,147,.38);
    }
    .cp-btn:active { transform: scale(.9); }
    .cp-btn.copied { opacity: .65; }
    .cp-btn svg { width:18px; height:18px; fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

    /* chips */
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 500;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07); color: var(--mut);
    }
    .chip.valid   { color:#6bcb77; border-color:rgba(107,203,119,.2); background:rgba(107,203,119,.06); }
    .chip.expired { color:#ff6b6b; border-color:rgba(255,107,107,.2); background:rgba(255,107,107,.06); }
    .chip.web     { color:#7eb8f7; border-color:rgba(126,184,247,.2); background:rgba(126,184,247,.06); }

    /* desc */
    .desc {
      font-size: 13px; font-weight: 300; color: rgba(255,255,255,.42);
      line-height: 1.78; margin-bottom: 16px;
    }

    /* info blocks */
    .iblock {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--ln); border-radius: 14px;
      padding: 13px 16px; margin-bottom: 12px;
    }
    .iblock-hdr {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .iblock-ico {
      width: 27px; height: 27px; border-radius: 8px;
      background: rgba(255,255,255,.05);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
    }
    .iblock-lbl {
      font-size: 9px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--mut);
    }
    .iblock-txt {
      font-size: 12px; font-weight: 300;
      color: rgba(255,255,255,.42); line-height: 1.65; padding-left: 35px;
    }

    /* redeem */
    .redeem-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 17px;
      background: linear-gradient(135deg, var(--p) 0%, var(--s) 100%);
      color: #fff; border: none; border-radius: 16px;
      font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600;
      letter-spacing: .3px; cursor: pointer; text-decoration: none;
      transition: transform .15s;
      animation: glow 3s ease-in-out infinite;
    }
    .redeem-btn:active { transform: scale(.98); }
    .redeem-btn svg { width:16px; height:16px; fill:none; stroke:#fff; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; transition:transform .2s; }
    .redeem-btn:hover svg { transform: translateX(4px); }

    /* address */
    .addr-card {
      margin: 12px 14px 0;
      background: var(--card); border: 1px solid var(--ln);
      border-radius: 20px; padding: 17px 18px;
      display: flex; gap: 13px; align-items: flex-start;
      animation: fadeUp .5s ease both; animation-delay: .55s;
    }
    .addr-ico {
      width: 42px; height: 42px; flex-shrink: 0; border-radius: 12px;
      background: linear-gradient(135deg,rgba(232,67,147,.14),rgba(255,107,53,.09));
      border: 1px solid rgba(232,67,147,.18);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .addr-lbl {
      font-size: 9px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--mut); margin-bottom: 5px;
    }
    .addr-txt { font-size: 13px; font-weight: 400; color: rgba(255,255,255,.68); line-height: 1.55; }

    /* footer */
    .footer {
      margin-top: 32px; padding: 0 22px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      animation: fadeUp .5s ease both; animation-delay: .65s;
    }
    .f-line {
      height: 1px; flex: 1; max-width: 64px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.07));
    }
    .f-line.r { background: linear-gradient(90deg, rgba(255,255,255,.07), transparent); }
    .f-txt { font-size: 10px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,.13); }
    .f-dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(255,255,255,.1); }

    /* toast */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(16,16,24,.96); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.08);
      color: #fff; display: flex; align-items: center; gap: 10px;
      padding: 11px 20px; border-radius: 40px;
      font-size: 13px; font-weight: 500; pointer-events: none;
      white-space: nowrap; z-index: 9999;
      transition: transform .38s cubic-bezier(.34,1.56,.64,1), opacity .38s;
      opacity: 0; box-shadow: 0 8px 40px rgba(0,0,0,.55);
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .t-ico {
      width: 20px; height: 20px; border-radius: 50%;
      background: linear-gradient(135deg, var(--p), var(--s));
      display: flex; align-items: center; justify-content: center; font-size: 11px;
    }
  </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-ring">
    <div id="sp-icon">🎟️</div>
    <div id="sp-logo-wrap"><img src="" alt="" /></div>
  </div>
  <div class="sp-label">Loading offer</div>
</div>

<!-- ERROR -->
<div id="error-page">
  <div class="err-orb">🎟️</div>
  <div class="err-title">Coupon Not Found</div>
  <div class="err-msg">This coupon link is invalid or has been removed.<br/>Please contact the store for assistance.</div>
</div>

<!-- CONTENT -->
<div id="content">

  <div class="hero">
    <img id="hero-img" src="" alt="" class="hero-img" style="display:none"/>
    <div class="hero-glow"></div>
    <div class="hero-grad"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="hero-badge">Exclusive Offer</div>
    <div class="logo-wrap" id="logo-wrap">
      <span id="logo-fb">🎟️</span>
      <img id="logo-img" src="" alt="" style="display:none"/>
    </div>
  </div>

  <div class="hdr">
    <div class="hdr-row">
      <div class="co-name" id="co-name"></div>
      <div class="scan-pill" id="scan-pill" style="display:none">
        <div class="s-dot"></div>
        <span id="scan-txt"></span>
      </div>
    </div>
  </div>

  <div class="c-wrap">
    <div class="c-border"></div>
    <div class="c-card">

      <div class="c-top">
        <div class="c-top-glow"></div>
        <div class="offer-tag"><div class="offer-tag-dot"></div>Exclusive Deal</div>
        <div class="headline" id="headline">Loading…</div>
      </div>

      <div class="perf"><div class="perf-line"></div></div>

      <div class="c-bot">

        <div id="code-block">
          <div class="code-lbl">Your Code</div>
          <div class="code-row">
            <div class="code-pill">
              <div class="code-val" id="code-val">——</div>
            </div>
            <button class="cp-btn" id="cp-btn" onclick="copyCode()">
              <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
        </div>

        <div class="chips" id="chips"></div>
        <div class="desc" id="desc" style="display:none"></div>

        <div class="iblock" id="terms-block" style="display:none">
          <div class="iblock-hdr">
            <div class="iblock-ico">📋</div>
            <div class="iblock-lbl">Terms &amp; Conditions</div>
          </div>
          <div class="iblock-txt" id="terms-txt"></div>
        </div>

        <div id="redeem-wrap" style="display:none; margin-top:6px">
          <a class="redeem-btn" id="redeem-btn" href="#" target="_blank" rel="noopener">
            Redeem Now
            <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </a>
        </div>

      </div>
    </div>
  </div>

  <div class="addr-card" id="addr-card" style="display:none">
    <div class="addr-ico">📍</div>
    <div>
      <div class="addr-lbl">Find Us At</div>
      <div class="addr-txt" id="addr-txt"></div>
    </div>
  </div>

  <div class="footer">
    <div class="f-line"></div>
    <div class="f-dot"></div>
    <div class="f-txt">QRPulse</div>
    <div class="f-dot"></div>
    <div class="f-line r"></div>
  </div>

</div>

<div id="toast"><div class="t-ico">✓</div>Code copied to clipboard</div>

<script>
  const SUPA_URL = 'https://huuamwhzydfhqziniqnf.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1dWFtd2h6eWRmaHF6aW5pcW5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MjAxOTUsImV4cCI6MjA4OTQ5NjE5NX0.-tTpabRI1b4enlUp8uIXMwmgGv2CLdFgE3vBk01Ye3Y';
  const slug = new URLSearchParams(location.search).get('id');

  async function loadCoupon() {
    if (!slug) { showError(); return; }
    try {
      const res = await fetch(
        `${SUPA_URL}/rest/v1/coupons?slug=eq.${encodeURIComponent(slug)}&select=*&limit=1`,
        { headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` } }
      );
      if (!res.ok) { showError(); return; }
      const rows = await res.json();
      if (!rows?.length) { showError(); return; }
      render(rows[0]);
    } catch(e) { console.error(e); showError(); }
  }

  function render(d) {
    if (d.primary_color) {
      document.documentElement.style.setProperty('--p', d.primary_color);
      document.documentElement.style.setProperty('--s', d.button_color || d.primary_color);
    }

    // Splash logo
    if (d.logo_url) {
      document.getElementById('sp-logo-wrap').style.display = 'block';
      document.getElementById('sp-logo-wrap').querySelector('img').src = d.logo_url;
      document.getElementById('sp-icon').style.display = 'none';
    }

    // Hero banner
    if (d.banner_url) {
      const hi = document.getElementById('hero-img');
      hi.src = d.banner_url; hi.style.display = 'block';
    }

    // Logo avatar
    if (d.logo_url) {
      const li = document.getElementById('logo-img');
      li.src = d.logo_url; li.style.display = 'block';
      document.getElementById('logo-fb').style.display = 'none';
    }

    // Text
    document.getElementById('co-name').textContent  = d.company || '';
    document.getElementById('headline').textContent = d.headline || 'Special Offer';

    // Scan count
    if (d.scan_count > 0) {
      document.getElementById('scan-pill').style.display = 'flex';
      document.getElementById('scan-txt').textContent =
        `${Number(d.scan_count).toLocaleString()} scans`;
    }

    // Code
    const code = (d.coupon_name || '').toUpperCase();
    window._code = code;
    if (code) {
      document.getElementById('code-val').textContent = code;
    } else {
      document.getElementById('code-block').style.display = 'none';
    }

    // Chips
    const chips = document.getElementById('chips');
    if (d.valid_until) {
      const exp = new Date(d.valid_until);
      const isExp = exp < new Date();
      const lbl = exp.toLocaleDateString('en-IN',
        { day:'numeric', month:'short', year:'numeric' });
      chips.innerHTML += `<div class="chip ${isExp?'expired':'valid'}">
        <span>${isExp?'✕':'✓'}</span> ${isExp?'Expired':'Valid until'} ${lbl}</div>`;
    }
    if (d.website_url) {
      const dom = d.website_url.replace(/^https?:\/\//,'').split('/')[0];
      chips.innerHTML += `<div class="chip web"><span>🌐</span> ${dom}</div>`;
    }

    // Description
    if (d.description) {
      const el = document.getElementById('desc');
      el.textContent = d.description; el.style.display = 'block';
    }

    // Terms
    if (d.terms_conditions?.trim()) {
      document.getElementById('terms-block').style.display = 'block';
      document.getElementById('terms-txt').textContent = d.terms_conditions;
    }

    // Address
    if (d.address?.trim()) {
      document.getElementById('addr-card').style.display = 'flex';
      document.getElementById('addr-txt').textContent = d.address;
    }

    // Redeem
    if (d.website_url) {
      const btn = document.getElementById('redeem-btn');
      btn.href = d.website_url.startsWith('http') ? d.website_url : 'https://'+d.website_url;
      document.getElementById('redeem-wrap').style.display = 'block';
    }

    document.title = `${code||'Offer'} — ${d.company||'Coupon'}`;
    setTimeout(showContent, 1200);
  }

  function showContent() {
    const sp = document.getElementById('splash');
    sp.style.transition = 'opacity .5s ease';
    sp.style.opacity = '0';
    setTimeout(() => {
      sp.style.display = 'none';
      document.getElementById('content').style.display = 'block';
    }, 500);
  }

  function showError() {
    document.getElementById('splash').style.display    = 'none';
    document.getElementById('error-page').style.display = 'flex';
  }

  function copyCode() {
    const code = window._code;
    if (!code) return;
    navigator.clipboard.writeText(code).catch(() => {
      const el = document.createElement('textarea');
      el.value = code; document.body.appendChild(el);
      el.select(); document.execCommand('copy');
      document.body.removeChild(el);
    });
    const btn = document.getElementById('cp-btn');
    const toast = document.getElementById('toast');
    btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><polyline points="20 6 9 17 4 12"/></svg>`;
    btn.classList.add('copied');
    toast.classList.add('show');
    setTimeout(() => {
      btn.innerHTML = `<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
      btn.classList.remove('copied');
      toast.classList.remove('show');
    }, 2500);
  }

  loadCoupon();
</script>
</body>
</html>
