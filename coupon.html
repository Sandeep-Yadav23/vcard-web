<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coupon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --g1: #ff6b35;
      --g2: #e8386d;
      --g3: #c0325a;
      --g4: #7c2fbd;
      --accent: #7c3aed;
      --accent2: #a855f7;
      --white: #ffffff;
      --bg: #4a1d96;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Nunito Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 16px 60px;
      overflow-x: hidden;
    }

    /* animated bg particles */
    .bg-particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .bg-p {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,.04);
      animation: bgFloat linear infinite;
    }

    @keyframes bgFloat {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
    }

    /* ── SPLASH ── */
    #splash {
      position: fixed; inset: 0; z-index: 999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 22px;
      background: var(--bg);
    }
    .sp-logo {
      width: 80px; height: 80px; border-radius: 24px;
      background: linear-gradient(135deg, var(--g1), var(--g2), var(--g4));
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      box-shadow: 0 20px 60px rgba(232,56,109,.5);
      animation: spPulse 1.8s ease-in-out infinite;
    }
    @keyframes spPulse { 0%,100%{transform:scale(1);box-shadow:0 20px 60px rgba(232,56,109,.4)} 50%{transform:scale(1.05);box-shadow:0 24px 80px rgba(255,107,53,.6)} }
    .sp-ring {
      position: absolute; inset: -8px; border-radius: 32px;
      border: 2px solid rgba(255,255,255,.12);
      animation: spRing 2.5s ease-in-out infinite;
    }
    @keyframes spRing { 0%,100%{opacity:.3;transform:scale(1)} 50%{opacity:.8;transform:scale(1.06)} }
    .sp-label {
      font-family: 'Nunito', sans-serif;
      font-size: 11px; font-weight: 800; letter-spacing: 4px;
      text-transform: uppercase; color: rgba(255,255,255,.4);
    }
    .sp-bar {
      width: 160px; height: 3px; background: rgba(255,255,255,.08);
      border-radius: 4px; overflow: hidden;
    }
    .sp-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--g1), var(--g2));
      border-radius: 4px;
      animation: spLoad 1.1s ease forwards;
    }
    @keyframes spLoad { to { width: 100%; } }

    /* ── ERROR ── */
    #error-page {
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 40px; text-align: center;
      position: relative; z-index: 1;
    }
    .err-badge {
      width: 100px; height: 100px; border-radius: 50%;
      background: linear-gradient(135deg, var(--g1), var(--g4));
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; margin-bottom: 24px;
      box-shadow: 0 20px 60px rgba(232,56,109,.4);
    }
    .err-title {
      font-family: 'Nunito', sans-serif;
      font-size: 28px; font-weight: 900; color: #fff; margin-bottom: 10px;
    }
    .err-msg { font-size: 14px; color: rgba(255,255,255,.5); line-height: 1.7; }

    /* ── CONTENT ── */
    #content {
      display: none; position: relative; z-index: 1;
      width: 100%; max-width: 520px;
    }

    /* ── TICKET ── */
    .ticket-wrap {
      position: relative;
      filter: drop-shadow(0 30px 80px rgba(120,30,180,.5)) drop-shadow(0 8px 24px rgba(0,0,0,.3));
    }

    .ticket {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      animation: ticketIn .7s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes ticketIn {
      from { opacity: 0; transform: scale(.85) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* gradient bg */
    .ticket-bg {
      position: absolute; inset: 0;
      background: linear-gradient(135deg,
        var(--g1) 0%, var(--g2) 40%, var(--g3) 65%, var(--g4) 100%);
      z-index: 0;
    }

    /* animated wave blob */
    .blob-svg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      z-index: 1; pointer-events: none;
      overflow: hidden;
    }

    /* notched left/right edges via clip-path handled with SVG filter */
    .ticket-inner {
      position: relative; z-index: 2;
      padding: 0;
    }

    /* top section */
    .tk-main {
      padding: 32px 32px 24px;
      position: relative;
    }

    /* badge pill */
    .badge-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(124,58,237,.85); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 40px; padding: 7px 16px;
      margin-bottom: 20px;
      animation: fadeUp .5s ease both .3s;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; animation: pulse 1.8s infinite; }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
    .badge-txt {
      font-family: 'Nunito', sans-serif;
      font-size: 11px; font-weight: 800; letter-spacing: 2px;
      text-transform: uppercase; color: #fff;
    }

    .company-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 18px;
      animation: fadeUp .5s ease both .2s;
    }
    .co-logo {
      width: 44px; height: 44px; border-radius: 14px;
      background: rgba(255,255,255,.18); backdrop-filter: blur(10px);
      border: 1.5px solid rgba(255,255,255,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; overflow: hidden; flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(0,0,0,.2);
    }
    .co-logo img { width:100%; height:100%; object-fit:cover; }
    .co-name-wrap {}
    .co-label {
      font-size: 9px; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; color: rgba(255,255,255,.5); margin-bottom: 2px;
    }
    .co-name {
      font-family: 'Nunito', sans-serif;
      font-size: 16px; font-weight: 800; color: #fff;
    }

    /* Big discount */
    .disc-block {
      animation: fadeUp .5s ease both .35s;
      margin-bottom: 10px;
    }
    .disc-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: rgba(255,255,255,.6);
      margin-bottom: 4px;
    }
    .disc-value {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(64px, 18vw, 88px);
      font-weight: 900; line-height: .9;
      color: #fff;
      text-shadow: 0 4px 30px rgba(0,0,0,.25);
      letter-spacing: -2px;
    }
    .disc-off {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(28px, 8vw, 40px);
      font-weight: 900; color: rgba(255,255,255,.85);
      letter-spacing: 1px; display: block; margin-top: -4px;
    }
    .disc-sub {
      font-size: 12px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: rgba(255,255,255,.55);
      margin-top: 10px;
    }

    /* floating shapes (decorative) */
    .shape { position: absolute; pointer-events: none; }
    .shape-circle {
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.3);
    }
    .shape-arc {
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.25);
      border-bottom-color: transparent; border-left-color: transparent;
    }
    .shape-dot {
      border-radius: 50%;
      background: rgba(255,255,255,.4);
    }
    .shape-wave { color: rgba(255,255,255,.3); font-size: 28px; }
    .shape-dots-grid {
      display: grid; grid-template-columns: repeat(4, 6px); gap: 5px;
    }
    .sg-dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,.3); }

    /* scan pill */
    .scan-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(0,0,0,.18); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 30px; padding: 5px 14px;
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,.7);
      letter-spacing: 1px;
      position: absolute; top: 28px; right: 28px;
      animation: fadeUp .5s ease both .5s;
    }
    .s-dot { width: 6px; height: 6px; border-radius: 50%; background: #6bff9e; animation: pulse 2s infinite; }

    /* ── PERFORATED DIVIDER ── */
    .perf {
      position: relative; height: 28px;
      display: flex; align-items: center;
      background: linear-gradient(135deg, var(--g2) 0%, var(--g3) 60%, var(--g4) 100%);
      z-index: 3;
    }
    .perf-notch-l, .perf-notch-r {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--bg);
      z-index: 4;
    }
    .perf-notch-l { left: -14px; }
    .perf-notch-r { right: -14px; }
    .perf-dashes {
      flex: 1; margin: 0 24px; height: 2px;
      background: repeating-linear-gradient(90deg,
        rgba(255,255,255,.3) 0, rgba(255,255,255,.3) 8px,
        transparent 8px, transparent 18px);
    }

    /* ── BOTTOM CODE SECTION ── */
    .tk-code {
      padding: 22px 28px 28px;
      background: linear-gradient(135deg, var(--g2) 0%, var(--g3) 50%, var(--g4) 100%);
      position: relative; overflow: hidden;
    }
    .tk-code::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(0,0,0,.12);
    }
    .tk-code > * { position: relative; z-index: 1; }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 13px; border-radius: 30px;
      font-family: 'Nunito', sans-serif;
      font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); color: #fff;
      transition: background .2s;
    }
    .chip:hover { background: rgba(255,255,255,.2); }
    .chip.valid   { background: rgba(107,255,158,.12); border-color: rgba(107,255,158,.3); color: #6bff9e; }
    .chip.expired { background: rgba(255,107,107,.12); border-color: rgba(255,107,107,.3); color: #ff9090; }

    .code-lbl {
      font-size: 9px; font-weight: 800; letter-spacing: 3px;
      text-transform: uppercase; color: rgba(255,255,255,.45); margin-bottom: 10px;
    }
    .code-row { display: flex; align-items: stretch; gap: 0; margin-bottom: 16px; }
    .code-box {
      flex: 1;
      background: rgba(0,0,0,.2); backdrop-filter: blur(10px);
      border: 1.5px dashed rgba(255,255,255,.35);
      border-right: none; border-radius: 14px 0 0 14px;
      padding: 14px 18px;
      cursor: pointer;
      transition: background .2s;
    }
    .code-box:hover { background: rgba(0,0,0,.28); }
    .code-val {
      font-family: 'Nunito', sans-serif;
      font-size: 24px; font-weight: 900; letter-spacing: 4px; color: #fff;
    }
    .cp-btn {
      padding: 14px 20px;
      background: rgba(255,255,255,.95);
      border: none; border-radius: 0 14px 14px 0;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, background .2s;
      min-width: 56px;
    }
    .cp-btn:hover { background: #fff; }
    .cp-btn:active { transform: scale(.92); }
    .cp-btn svg { width:19px; height:19px; fill:none; stroke:var(--g2); stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }

    /* desc */
    .desc-txt {
      font-size: 12px; font-weight: 400; color: rgba(255,255,255,.5);
      line-height: 1.7; margin-bottom: 16px;
    }

    /* terms */
    .terms-block {
      background: rgba(0,0,0,.15); border: 1px solid rgba(255,255,255,.1);
      border-radius: 14px; padding: 14px 16px; margin-bottom: 16px;
      cursor: pointer;
    }
    .terms-hdr {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 10px; font-weight: 800; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,.45);
    }
    .terms-arrow { transition: transform .3s; font-size: 14px; color: rgba(255,255,255,.3); }
    .terms-arrow.open { transform: rotate(180deg); }
    .terms-body {
      max-height: 0; overflow: hidden;
      transition: max-height .4s ease, opacity .3s;
      opacity: 0;
    }
    .terms-body.open { max-height: 200px; opacity: 1; }
    .terms-txt { font-size: 11px; color: rgba(255,255,255,.4); line-height: 1.65; padding-top: 10px; }

    /* redeem btn */
    .redeem-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 16px;
      background: #fff;
      color: var(--g2); border: none; border-radius: 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 900; letter-spacing: 1.5px;
      text-transform: uppercase; cursor: pointer; text-decoration: none;
      transition: transform .15s, box-shadow .2s;
      box-shadow: 0 8px 30px rgba(0,0,0,.25);
      position: relative; overflow: hidden;
    }
    .redeem-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--g1), var(--g2));
      opacity: 0; transition: opacity .3s;
    }
    .redeem-btn:hover::before { opacity: 1; }
    .redeem-btn:hover { color: #fff; transform: translateY(-2px); box-shadow: 0 14px 40px rgba(0,0,0,.3); }
    .redeem-btn:active { transform: scale(.98); }
    .redeem-btn span, .redeem-btn svg { position: relative; z-index: 1; }
    .redeem-btn svg { width:16px; height:16px; fill:none; stroke:currentColor; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; transition:transform .2s; }
    .redeem-btn:hover svg { transform: translateX(4px); }

    /* ── ADDRESS ── */
    .addr-card {
      margin-top: 14px;
      background: rgba(255,255,255,.08); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 20px; padding: 16px 18px;
      display: flex; gap: 14px; align-items: flex-start;
      animation: fadeUp .5s ease both .55s;
    }
    .addr-ico {
      width: 42px; height: 42px; flex-shrink: 0; border-radius: 13px;
      background: linear-gradient(135deg, rgba(255,107,53,.4), rgba(232,56,109,.4));
      border: 1px solid rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .addr-lbl {
      font-size: 8px; font-weight: 800; letter-spacing: 2.5px;
      text-transform: uppercase; color: rgba(255,255,255,.35); margin-bottom: 5px;
    }
    .addr-txt { font-size: 13px; color: rgba(255,255,255,.75); line-height: 1.5; font-weight: 600; }

    /* ── FOOTER ── */
    .footer {
      margin-top: 28px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      animation: fadeUp .5s ease both .6s;
    }
    .f-line { height: 1px; width: 50px; background: rgba(255,255,255,.12); }
    .f-txt { font-size: 9px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,.2); }
    .f-dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(255,255,255,.2); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(255,255,255,.97);
      color: var(--g2);
      display: flex; align-items: center; gap: 10px;
      padding: 12px 24px; border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 13px; font-weight: 800; letter-spacing: 1px;
      pointer-events: none; white-space: nowrap; z-index: 9999;
      transition: transform .42s cubic-bezier(.34,1.56,.64,1), opacity .42s;
      opacity: 0;
      box-shadow: 0 12px 50px rgba(232,56,109,.4);
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .t-ico {
      width: 22px; height: 22px; border-radius: 50%;
      background: linear-gradient(135deg, var(--g1), var(--g2));
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: #fff; font-weight: 900;
    }

    /* ── UTILS ── */
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)} }
    @keyframes floatEl { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-10px) rotate(5deg)} }
    @keyframes floatEl2 { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-8px) rotate(-4deg)} }
    @keyframes spin360 { to { transform: rotate(360deg); } }
    @keyframes scaleBreath { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }

    /* tilt on hover */
    .ticket-wrap { transition: transform .4s ease; }
    .ticket-wrap:hover { transform: perspective(800px) rotateX(2deg) rotateY(-1deg) scale(1.01); }
  </style>
</head>
<body>

<!-- BG PARTICLES -->
<div class="bg-particles" id="bgParticles"></div>

<!-- SPLASH -->
<div id="splash">
  <div style="position:relative">
    <div class="sp-logo">🎟️</div>
    <div class="sp-ring"></div>
  </div>
  <div class="sp-label">Loading your offer</div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
</div>

<!-- ERROR -->
<div id="error-page">
  <div class="err-badge">🎟️</div>
  <div class="err-title">Coupon Not Found</div>
  <div class="err-msg">This coupon link is invalid or has expired.<br/>Please contact the store for assistance.</div>
</div>

<!-- CONTENT -->
<div id="content">
  <div class="ticket-wrap" id="ticketWrap">
    <div class="ticket" id="ticket">

      <!-- gradient bg -->
      <div class="ticket-bg"></div>

      <!-- animated wavy blobs (SVG) -->
      <svg class="blob-svg" viewBox="0 0 520 420" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="blur1"><feGaussianBlur stdDeviation="2"/></filter>
        </defs>
        <!-- main wave blob -->
        <path opacity="0.28" fill="rgba(124,47,189,1)">
          <animate attributeName="d" dur="8s" repeatCount="indefinite"
            values="
              M0,200 C80,160 160,240 260,200 C360,160 440,220 520,180 L520,420 L0,420 Z;
              M0,220 C100,180 180,260 280,210 C380,160 460,240 520,200 L520,420 L0,420 Z;
              M0,200 C80,160 160,240 260,200 C360,160 440,220 520,180 L520,420 L0,420 Z
            "/>
        </path>
        <!-- secondary wave -->
        <path opacity="0.18" fill="rgba(80,20,160,1)">
          <animate attributeName="d" dur="6s" repeatCount="indefinite"
            values="
              M0,260 C120,230 200,300 320,260 C400,230 470,280 520,250 L520,420 L0,420 Z;
              M0,240 C100,260 220,290 340,250 C420,220 490,270 520,240 L520,420 L0,420 Z;
              M0,260 C120,230 200,300 320,260 C400,230 470,280 520,250 L520,420 L0,420 Z
            "/>
        </path>
      </svg>

      <!-- MAIN CONTENT AREA -->
      <div class="ticket-inner">
        <div class="tk-main">

          <!-- scan pill -->
          <div class="scan-pill" id="scan-pill" style="display:none">
            <div class="s-dot"></div>
            <span id="scan-txt"></span>
          </div>

          <!-- badge -->
          <div class="badge-pill" id="badge-pill">
            <div class="badge-dot"></div>
            <span class="badge-txt" id="badge-txt">Exclusive Deal</span>
          </div>

          <!-- company -->
          <div class="company-row" id="company-row">
            <div class="co-logo" id="co-logo">
              <span id="logo-fb">🎟️</span>
              <img id="logo-img" src="" alt="" style="display:none"/>
            </div>
            <div class="co-name-wrap">
              <div class="co-label">Offered by</div>
              <div class="co-name" id="co-name">Store</div>
            </div>
          </div>

          <!-- discount -->
          <div class="disc-block">
            <div class="disc-eyebrow" id="disc-eyebrow">Only This Week</div>
            <div class="disc-value" id="disc-value">50%</div>
            <span class="disc-off" id="disc-off">OFF</span>
            <div class="disc-sub" id="disc-sub">On Your Next Purchase</div>
          </div>

          <!-- floating decorative shapes -->
          <!-- circles top right -->
          <div class="shape shape-circle" style="width:60px;height:60px;top:18px;right:100px;animation:floatEl 5s ease-in-out infinite"></div>
          <div class="shape shape-circle" style="width:38px;height:38px;top:44px;right:72px;animation:floatEl 5s ease-in-out infinite .5s"></div>
          <div class="shape shape-circle" style="width:20px;height:20px;top:78px;right:110px;animation:floatEl 5s ease-in-out infinite 1s"></div>

          <!-- dot grid bottom-left -->
          <div class="shape shape-dots-grid" style="bottom:18px;left:18px;animation:floatEl2 6s ease-in-out infinite">
            <div class="sg-dot"></div><div class="sg-dot"></div><div class="sg-dot"></div><div class="sg-dot"></div>
            <div class="sg-dot"></div><div class="sg-dot"></div><div class="sg-dot"></div><div class="sg-dot"></div>
            <div class="sg-dot"></div><div class="sg-dot"></div><div class="sg-dot"></div><div class="sg-dot"></div>
          </div>

          <!-- wave squiggle right -->
          <div class="shape shape-wave" style="bottom:24px;right:30px;animation:floatEl 7s ease-in-out infinite 1.2s">〜</div>

          <!-- arc circle bottom center -->
          <div class="shape" style="width:90px;height:90px;bottom:-30px;left:50%;transform:translateX(-50%);animation:floatEl2 8s ease-in-out infinite">
            <svg width="90" height="90" viewBox="0 0 90 90" fill="none">
              <circle cx="45" cy="45" r="42" stroke="rgba(255,255,255,.25)" stroke-width="1.5"/>
              <circle cx="45" cy="45" r="32" stroke="rgba(255,255,255,.18)" stroke-width="1.5"/>
              <circle cx="45" cy="45" r="22" stroke="rgba(255,255,255,.12)" stroke-width="1.5"/>
            </svg>
          </div>

          <!-- small dot accent -->
          <div class="shape shape-dot" style="width:10px;height:10px;top:100px;right:60px;animation:scaleBreath 3s ease-in-out infinite"></div>
          <div class="shape shape-dot" style="width:6px;height:6px;top:140px;right:90px;animation:scaleBreath 3s ease-in-out infinite .5s;opacity:.5"></div>

        </div>

        <!-- PERFORATED DIVIDER -->
        <div class="perf">
          <div class="perf-notch-l"></div>
          <div class="perf-dashes"></div>
          <div class="perf-notch-r"></div>
        </div>

        <!-- CODE + ACTION SECTION -->
        <div class="tk-code">

          <!-- floating shapes in code area -->
          <div class="shape shape-wave" style="position:absolute;top:14px;right:22px;font-size:22px;color:rgba(255,255,255,.15);animation:floatEl 6s ease-in-out infinite 2s">〜</div>
          <div class="shape shape-dots-grid" style="position:absolute;bottom:22px;right:16px;animation:floatEl2 7s ease-in-out infinite .5s">
            <div class="sg-dot"></div><div class="sg-dot"></div><div class="sg-dot"></div>
            <div class="sg-dot"></div><div class="sg-dot"></div><div class="sg-dot"></div>
            <div class="sg-dot"></div><div class="sg-dot"></div><div class="sg-dot"></div>
          </div>

          <!-- chips (validity, etc) -->
          <div class="chips" id="chips"></div>

          <!-- description -->
          <div class="desc-txt" id="desc-txt" style="display:none"></div>

          <!-- code -->
          <div id="code-block">
            <div class="code-lbl">Your Coupon Code</div>
            <div class="code-row">
              <div class="code-box" onclick="copyCode()">
                <div class="code-val" id="code-val">——</div>
              </div>
              <button class="cp-btn" id="cp-btn" onclick="copyCode()">
                <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              </button>
            </div>
          </div>

          <!-- terms collapsible -->
          <div class="terms-block" id="terms-block" style="display:none" onclick="toggleTerms()">
            <div class="terms-hdr">
              <span>Terms &amp; Conditions</span>
              <span class="terms-arrow" id="terms-arrow">▾</span>
            </div>
            <div class="terms-body" id="terms-body">
              <div class="terms-txt" id="terms-txt"></div>
            </div>
          </div>

          <!-- redeem -->
          <div id="redeem-wrap" style="display:none">
            <a class="redeem-btn" id="redeem-btn" href="#" target="_blank" rel="noopener">
              <span>Redeem Now</span>
              <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </a>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- ADDRESS -->
  <div class="addr-card" id="addr-card" style="display:none">
    <div class="addr-ico">📍</div>
    <div>
      <div class="addr-lbl">Find Us At</div>
      <div class="addr-txt" id="addr-txt"></div>
    </div>
  </div>

  <div class="footer">
    <div class="f-line"></div>
    <div class="f-dot"></div>
    <div class="f-txt">QRPulse</div>
    <div class="f-dot"></div>
    <div class="f-line"></div>
  </div>
</div>

<div id="toast"><div class="t-ico">✓</div>Code copied!</div>

<script>
  // Background particles
  (function() {
    const container = document.getElementById('bgParticles');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'bg-p';
      const size = Math.random() * 80 + 20;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        animation-duration:${Math.random()*12+8}s;
        animation-delay:${Math.random()*10}s;
      `;
      container.appendChild(p);
    }
  })();

  // Parallax tilt on mouse move
  const wrap = document.getElementById('ticketWrap');
  if (wrap) {
    document.addEventListener('mousemove', e => {
      const rect = wrap.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = (e.clientX - cx) / (window.innerWidth / 2);
      const dy = (e.clientY - cy) / (window.innerHeight / 2);
      wrap.style.transform = `perspective(900px) rotateY(${dx * 5}deg) rotateX(${-dy * 3}deg) scale(1.01)`;
    });
    document.addEventListener('mouseleave', () => {
      wrap.style.transform = '';
    });
  }

  const SUPA_URL = 'https://huuamwhzydfhqziniqnf.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1dWFtd2h6eWRmaHF6aW5pcW5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MjAxOTUsImV4cCI6MjA4OTQ5NjE5NX0.-tTpabRI1b4enlUp8uIXMwmgGv2CLdFgE3vBk01Ye3Y';
  const slug = new URLSearchParams(location.search).get('id');

  async function loadCoupon() {
    if (!slug) { showError(); return; }
    try {
      const res = await fetch(
        `${SUPA_URL}/rest/v1/coupons?slug=eq.${encodeURIComponent(slug)}&select=*&limit=1`,
        { headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` } }
      );
      if (!res.ok) { showError(); return; }
      const rows = await res.json();
      if (!rows?.length) { showError(); return; }
      render(rows[0]);
    } catch(e) { console.error(e); showError(); }
  }

  function render(d) {
    if (d.primary_color) {
      document.documentElement.style.setProperty('--g2', d.primary_color);
      document.documentElement.style.setProperty('--accent', d.button_color || d.primary_color);
    }

    // Logo
    if (d.logo_url) {
      const li = document.getElementById('logo-img');
      li.src = d.logo_url; li.style.display = 'block';
      document.getElementById('logo-fb').style.display = 'none';
    }

    // Company name
    document.getElementById('co-name').textContent = d.company || 'Store';

    // Badge
    if (d.company) document.getElementById('badge-txt').textContent = d.company + ' Deal';

    // Headline → parse discount
    const headline = d.headline || '';
    const pctMatch = headline.match(/(\d+[\d.]*)\s*%/);
    const currMatch = headline.match(/([₹$€£])\s*(\d+[\d.]*)/);
    if (pctMatch) {
      document.getElementById('disc-value').textContent = pctMatch[1] + '%';
      document.getElementById('disc-off').textContent = 'OFF';
    } else if (currMatch) {
      document.getElementById('disc-value').textContent = currMatch[1] + currMatch[2];
      document.getElementById('disc-off').textContent = 'OFF';
    } else {
      document.getElementById('disc-value').textContent = '✦';
      document.getElementById('disc-value').style.fontSize = '56px';
      document.getElementById('disc-off').textContent = headline || 'Special Offer';
    }

    document.getElementById('disc-sub').textContent = d.description ? '' : 'On Your Next Purchase';

    // Description
    if (d.description) {
      const el = document.getElementById('desc-txt');
      el.textContent = d.description; el.style.display = 'block';
    }

    // Scan count
    if (d.scan_count > 0) {
      document.getElementById('scan-pill').style.display = 'flex';
      document.getElementById('scan-txt').textContent = Number(d.scan_count).toLocaleString() + ' scans';
    }

    // Code
    const code = (d.coupon_name || '').toUpperCase();
    window._code = code;
    if (code) {
      document.getElementById('code-val').textContent = code;
    } else {
      document.getElementById('code-block').style.display = 'none';
    }

    // Chips
    const chips = document.getElementById('chips');
    if (d.valid_until) {
      const exp = new Date(d.valid_until);
      const isExp = exp < new Date();
      const lbl = exp.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
      chips.innerHTML += `<div class="chip ${isExp?'expired':'valid'}">${isExp?'✕ Expired':'✓ Valid until '+lbl}</div>`;
    }
    if (d.website_url) {
      const dom = d.website_url.replace(/^https?:\/\//,'').split('/')[0];
      chips.innerHTML += `<div class="chip">🌐 ${dom}</div>`;
    }

    // Terms
    if (d.terms_conditions?.trim()) {
      document.getElementById('terms-block').style.display = 'block';
      document.getElementById('terms-txt').textContent = d.terms_conditions;
    }

    // Address
    if (d.address?.trim()) {
      document.getElementById('addr-card').style.display = 'flex';
      document.getElementById('addr-txt').textContent = d.address;
    }

    // Redeem
    if (d.website_url) {
      const btn = document.getElementById('redeem-btn');
      btn.href = d.website_url.startsWith('http') ? d.website_url : 'https://'+d.website_url;
      document.getElementById('redeem-wrap').style.display = 'block';
    }

    document.title = `${code||'Offer'} — ${d.company||'Coupon'}`;
    setTimeout(showContent, 1300);
  }

  function showContent() {
    const sp = document.getElementById('splash');
    sp.style.transition = 'opacity .5s ease';
    sp.style.opacity = '0';
    setTimeout(() => {
      sp.style.display = 'none';
      document.getElementById('content').style.display = 'block';
    }, 500);
  }

  function showError() {
    document.getElementById('splash').style.display = 'none';
    document.getElementById('error-page').style.display = 'flex';
  }

  function toggleTerms() {
    const body = document.getElementById('terms-body');
    const arrow = document.getElementById('terms-arrow');
    body.classList.toggle('open');
    arrow.classList.toggle('open');
  }

  function copyCode() {
    const code = window._code;
    if (!code) return;
    navigator.clipboard.writeText(code).catch(() => {
      const el = document.createElement('textarea');
      el.value = code; document.body.appendChild(el);
      el.select(); document.execCommand('copy');
      document.body.removeChild(el);
    });
    const btn = document.getElementById('cp-btn');
    btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:19px;height:19px;fill:none;stroke:var(--g2);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><polyline points="20 6 9 17 4 12"/></svg>`;
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    // ripple effect on code box
    const cb = document.querySelector('.code-box');
    cb.style.background = 'rgba(255,255,255,.15)';
    setTimeout(() => { cb.style.background = ''; }, 300);

    setTimeout(() => {
      btn.innerHTML = `<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
      toast.classList.remove('show');
    }, 2500);
  }

  loadCoupon();
</script>
</body>
</html>
