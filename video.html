<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Loading Video Page...</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── Reset & Root ── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --p:#447fb6;
  --btn:#e91e63;
  --bg:#f5f6fa;
  --card:#ffffff;
  --border:#e2e6ef;
  --text:#1e2235;
  --muted:#8a93a8;
}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ── Loading Screen ── */
.loading-screen{
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;
  background:var(--bg);
}
.loader{
  width:56px;height:56px;
  position:relative;margin-bottom:20px;
}
.loader::before,.loader::after{
  content:'';position:absolute;inset:0;
  border-radius:50%;
  border:3px solid transparent;
  border-top-color:var(--p);
  animation:spin 1s linear infinite;
}
.loader::after{
  inset:8px;
  border-top-color:var(--btn);
  animation-duration:.6s;animation-direction:reverse;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen h2{
  font-family:'Syne',sans-serif;
  font-size:18px;font-weight:700;
  color:var(--text);margin-bottom:6px;
}
.loading-screen p{font-size:13px;color:var(--muted)}

/* ── Error Screen ── */
.error-screen{
  min-height:100vh;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;text-align:center;
}
.error-icon{font-size:60px;margin-bottom:16px;animation:bounce .6s ease infinite alternate}
@keyframes bounce{to{transform:translateY(-8px)}}
.error-screen h2{
  font-family:'Syne',sans-serif;
  font-size:22px;font-weight:800;
  color:var(--text);margin-bottom:8px;
}
.error-screen p{font-size:14px;color:var(--muted);max-width:280px;line-height:1.6}

/* ── Page ── */
.page{
  max-width:640px;margin:0 auto;
  padding-bottom:100px;
  display:none;
  animation:fadeUp .5s ease forwards;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── Hero Header ── */
.hero-header{
  background:linear-gradient(135deg,var(--p),var(--p-dark,#2a5a8a));
  padding:48px 24px 80px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.hero-header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 70% 30%,rgba(255,255,255,.08) 0%,transparent 60%);
}
.hero-header::after{
  content:'';position:absolute;
  bottom:-2px;left:0;right:0;height:40px;
  background:var(--bg);
  clip-path:ellipse(55% 100% at 50% 100%);
}
.company-badge{
  display:inline-block;
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(8px);
  color:#fff;font-size:11px;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;
  padding:5px 14px;border-radius:50px;
  margin-bottom:14px;border:1px solid rgba(255,255,255,.25);
}
.hero-title{
  font-family:'Syne',sans-serif;
  font-size:28px;font-weight:800;
  color:#fff;line-height:1.2;
  margin-bottom:12px;
  text-shadow:0 2px 12px rgba(0,0,0,.15);
}
.hero-desc{
  font-size:14px;color:rgba(255,255,255,.85);
  line-height:1.7;max-width:420px;margin:0 auto 20px;
}
.hero-cta{
  display:inline-flex;align-items:center;gap:8px;
  padding:13px 28px;border-radius:50px;
  background:var(--btn);color:#fff;
  font-family:'Syne',sans-serif;
  font-size:14px;font-weight:700;
  text-decoration:none;
  box-shadow:0 4px 20px rgba(233,30,99,.4);
  transition:.2s;
}
.hero-cta:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(233,30,99,.5)}
.hero-cta svg{width:16px;height:16px}

/* ── Logo ── */
.logo-wrap{
  display:flex;justify-content:center;
  margin-top:-36px;
  position:relative;z-index:2;
  margin-bottom:8px;
}
.logo-img{
  width:72px;height:72px;
  border-radius:50%;
  border:4px solid var(--bg);
  object-fit:cover;
  box-shadow:0 4px 24px rgba(0,0,0,.15);
}

/* ── Section ── */
.section{padding:24px 20px 0}
.section-label{
  font-family:'Syne',sans-serif;
  font-size:11px;font-weight:700;
  color:var(--muted);
  text-transform:uppercase;letter-spacing:1.6px;
  margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.section-label::after{
  content:'';flex:1;height:1px;background:var(--border);
}

/* ── Featured Video ── */
.featured-video{
  border-radius:18px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.12);
  background:#000;
  position:relative;margin-bottom:4px;
}
.featured-video iframe{
  width:100%;aspect-ratio:16/9;
  display:block;border:none;
}
.featured-badge{
  position:absolute;top:12px;left:12px;
  background:var(--btn);color:#fff;
  font-size:10px;font-weight:700;
  letter-spacing:.8px;text-transform:uppercase;
  padding:4px 10px;border-radius:50px;
}
.featured-title{
  font-family:'Syne',sans-serif;
  font-size:15px;font-weight:700;
  color:var(--text);line-height:1.4;
  margin-top:12px;padding:0 4px;
}

/* ── Video Grid ── */
.video-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:16px;
}
.video-card{
  background:var(--card);
  border-radius:14px;
  border:1.5px solid var(--border);
  overflow:hidden;
  box-shadow:0 2px 12px rgba(30,34,53,.05);
  transition:.2s;cursor:pointer;
}
.video-card:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(30,34,53,.10);
  border-color:var(--p);
}
.video-thumb{
  width:100%;aspect-ratio:16/9;
  background:#1e2235;position:relative;
  overflow:hidden;
}
.video-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.play-overlay{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.3);
  opacity:0;transition:.2s;
}
.video-card:hover .play-overlay{opacity:1}
.play-btn{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.92);
  display:flex;align-items:center;justify-content:center;
}
.play-btn svg{width:18px;height:18px;fill:var(--text);margin-left:3px}
.video-info{padding:10px 12px 12px}
.video-title{
  font-size:12px;font-weight:600;
  color:var(--text);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}

/* ── Video Modal ── */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(6px);
  z-index:500;
  display:none;align-items:center;justify-content:center;
  padding:20px;
  animation:fadeIn .2s ease;
}
.modal-overlay.open{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{
  width:100%;max-width:600px;
  background:#000;border-radius:20px;
  overflow:hidden;position:relative;
  box-shadow:0 24px 60px rgba(0,0,0,.6);
  animation:scaleIn .25s ease;
}
@keyframes scaleIn{from{transform:scale(.92)}to{transform:scale(1)}}
.modal-box iframe{width:100%;aspect-ratio:16/9;border:none;display:block}
.modal-close{
  position:absolute;top:12px;right:12px;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(4px);
  border:none;cursor:pointer;color:#fff;
  font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:.15s;z-index:10;
}
.modal-close:hover{background:rgba(255,255,255,.25)}
.modal-title{
  padding:14px 16px;background:#111;
  font-family:'Syne',sans-serif;
  font-size:14px;font-weight:600;color:#fff;
  line-height:1.4;
}

/* ── Social Buttons ── */
.social-row{display:flex;flex-wrap:wrap;gap:10px}
.social-btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:10px 18px;border-radius:50px;
  color:#fff;font-size:13px;font-weight:600;
  text-decoration:none;transition:.2s;
  font-family:'Syne',sans-serif;
}
.social-btn:hover{transform:translateY(-2px);opacity:.88}

/* ── Share FAB ── */
.share-fab{
  position:fixed;bottom:28px;right:20px;
  width:54px;height:54px;border-radius:50%;
  background:var(--btn);color:#fff;
  border:none;font-size:22px;cursor:pointer;
  box-shadow:0 4px 20px rgba(233,30,99,.4);
  display:flex;align-items:center;justify-content:center;
  z-index:100;transition:.2s;
}
.share-fab:hover{transform:scale(1.08)}

/* ── Toast ── */
.toast{
  position:fixed;bottom:96px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--text);color:#fff;
  padding:10px 22px;border-radius:50px;
  font-size:13px;font-weight:600;
  opacity:0;transition:.3s;pointer-events:none;
  white-space:nowrap;z-index:300;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Responsive ── */
@media(max-width:400px){
  .video-grid{grid-template-columns:1fr}
  .hero-title{font-size:22px}
}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
  <div class="loader"></div>
  <h2>Loading Video Page...</h2>
  <p>Fetching content for you</p>
</div>

<!-- Error -->
<div class="error-screen" id="errorScreen">
  <div class="error-icon">📹</div>
  <h2>Page Not Found</h2>
  <p>This QR code may be invalid or the page has been removed.</p>
</div>

<!-- Video Page -->
<div class="page" id="page"></div>

<!-- Video Modal -->
<div class="modal-overlay" id="videoModal" onclick="closeModal(event)">
  <div class="modal-box" id="modalBox">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <iframe id="modalIframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    <div class="modal-title" id="modalTitle"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
var SUPABASE_URL  = 'https://huuamwhzydfhqziniqnf.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1dWFtd2h6eWRmaHF6aW5pcW5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MjAxOTUsImV4cCI6MjA4OTQ5NjE5NX0.-tTpabRI1b4enlUp8uIXMwmgGv2CLdFgE3vBk01Ye3Y';
var BUCKET = 'video-pages';

var SOCIAL_COLORS = {
  'Facebook':'#1877F2','Instagram':'#E1306C','Twitter/X':'#000000',
  'YouTube':'#FF0000','LinkedIn':'#0A66C2','TikTok':'#010101','Website':'#607D8B'
};
var SOCIAL_EMOJI = {
  'Facebook':'📘','Instagram':'📸','Twitter/X':'🐦',
  'YouTube':'▶️','LinkedIn':'💼','TikTok':'🎵','Website':'🌐'
};

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
(async function(){
  var slug = new URLSearchParams(window.location.search).get('id');
  if(!slug){ showError(); return; }

  try{
    var jsonUrl = SUPABASE_URL + '/storage/v1/object/public/' + BUCKET
                + '/pages/' + slug + '/data.json';

    var res = await fetch(jsonUrl, { headers:{ 'apikey': SUPABASE_ANON } });
    if(!res.ok){ showError(); return; }

    var d = await res.json();
    renderPage(d);
  } catch(e){
    console.error(e);
    showError();
  }
})();

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function getYouTubeId(url){
  if(!url) return null;
  var m = url.match(/(?:youtu\.be\/|v=|\/embed\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}
function getThumb(url){ var id=getYouTubeId(url); return id?'https://img.youtube.com/vi/'+id+'/mqdefault.jpg':null; }
function getEmbed(url){ var id=getYouTubeId(url); return id?'https://www.youtube.com/embed/'+id+'?autoplay=1&rel=0':null; }
function esc(s){ if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function darken(hex){
  try{
    var c=hex.replace('#','');var v=parseInt('FF'+c,16);
    var r=Math.round(((v>>16)&0xFF)*.65).toString(16).padStart(2,'0');
    var g=Math.round(((v>>8)&0xFF)*.65).toString(16).padStart(2,'0');
    var b=Math.round((v&0xFF)*.65).toString(16).padStart(2,'0');
    return '#'+r+g+b;
  }catch(e){return hex;}
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function renderPage(d){
  var primary = d.primaryColor || '#447fb6';
  var btnColor = d.buttonColor  || '#e91e63';
  var bgColor  = d.bgColor      || '#f5f6fa';

  document.documentElement.style.setProperty('--p',   primary);
  document.documentElement.style.setProperty('--btn', btnColor);
  document.documentElement.style.setProperty('--bg',  bgColor);
  document.documentElement.style.setProperty('--p-dark', darken(primary));
  document.body.style.background = bgColor;
  document.title = (d.company||'Video') + ' — ' + (d.headline||'Videos');

  var videos = d.videos || [];
  var featured = videos[0] || null;
  var rest = videos.slice(1);

  var html = '';

  // ── Hero Header
  html += '<div class="hero-header">';
  if(d.company) html += '<div class="company-badge">'+esc(d.company)+'</div>';
  html += '<h1 class="hero-title">'+esc(d.headline||'Watch Our Videos')+'</h1>';
  if(d.description) html += '<p class="hero-desc">'+esc(d.description)+'</p>';
  if(d.showButton && d.buttonUrl){
    html += '<a href="'+esc(d.buttonUrl)+'" class="hero-cta" target="_blank" rel="noopener">';
    html += '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 3v2H5v14h14v-9h2v10a1 1 0 01-1 1H4a1 1 0 01-1-1V4a1 1 0 011-1h10zm7-1v6h-2V5.414l-9.293 9.293-1.414-1.414L18.586 4H15V2h6z"/></svg>';
    html += esc(d.buttonLabel||'Learn More')+'</a>';
  }
  html += '</div>';

  // ── Logo
  if(d.logoUrl){
    html += '<div class="logo-wrap"><img src="'+esc(d.logoUrl)+'" class="logo-img" alt="Logo" loading="lazy"/></div>';
  }

  // ── Featured Video
  if(featured){
    var featId   = getYouTubeId(featured.url);
    var featEmbed = getEmbed(featured.url);
    var featThumb = getThumb(featured.url);

    html += '<div class="section">';
    html += '<div class="section-label">Featured Video</div>';
    html += '<div class="featured-video">';
    html += '<span class="featured-badge">⭐ Featured</span>';
    if(d.highlightFirst && featId){
      html += '<iframe src="'+featEmbed+'" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe>';
    } else if(featThumb){
      html += '<div class="video-thumb" style="cursor:pointer" onclick="openModal(\''+esc(featured.url)+'\',\''+esc(featured.title||'')+'\')"><img src="'+featThumb+'" alt="'+esc(featured.title||'')+'"/><div class="play-overlay"><div class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div></div>';
    }
    html += '</div>';
    if(featured.title) html += '<div class="featured-title">'+esc(featured.title)+'</div>';
    html += '</div>';
  }

  // ── More Videos
  if(rest.length > 0){
    html += '<div class="section"><div class="section-label">More Videos</div><div class="video-grid">';
    rest.forEach(function(v){
      var thumb = getThumb(v.url);
      html += '<div class="video-card" onclick="openModal(\''+esc(v.url)+'\',\''+esc(v.title||'')+'\')"><div class="video-thumb">';
      if(thumb) html += '<img src="'+thumb+'" alt="'+esc(v.title||'')+'" loading="lazy"/>';
      else html += '<div style="background:#1e2235;width:100%;height:100%"></div>';
      html += '<div class="play-overlay"><div class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>';
      html += '</div><div class="video-info"><div class="video-title">'+esc(v.title||'Untitled')+'</div></div></div>';
    });
    html += '</div></div>';
  }

  // ── Social
  if(d.socials && d.socials.length > 0){
    html += '<div class="section"><div class="section-label">Follow Us</div><div class="social-row">';
    d.socials.forEach(function(s){
      var emoji = SOCIAL_EMOJI[s.platform]||'🔗';
      var color = SOCIAL_COLORS[s.platform]||'#607D8B';
      html += '<a href="'+esc(s.url)+'" target="_blank" rel="noopener" class="social-btn" style="background:'+color+'">'+emoji+' '+esc(s.platform)+'</a>';
    });
    html += '</div></div>';
  }

  // ── Share FAB
  if(d.addShareButton !== false){
    html += '<button class="share-fab" onclick="sharePage()" title="Share">⬆</button>';
  }

  // ── Inject
  var page = document.getElementById('page');
  page.innerHTML = html;
  page.style.display = 'block';
  document.getElementById('loadingScreen').style.display = 'none';
}

// ─────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────
function openModal(url, title){
  var embed = getEmbed(url);
  if(!embed) return;
  document.getElementById('modalIframe').src = embed;
  document.getElementById('modalTitle').textContent = title || '';
  document.getElementById('videoModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModalDirect(){
  document.getElementById('videoModal').classList.remove('open');
  document.getElementById('modalIframe').src = '';
  document.body.style.overflow = '';
}
function closeModal(e){
  if(e.target === document.getElementById('videoModal')) closeModalDirect();
}
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeModalDirect(); });

// ─────────────────────────────────────────────
// SHARE
// ─────────────────────────────────────────────
function sharePage(){
  if(navigator.share){
    navigator.share({ title: document.title, url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href).then(function(){
      showToast('Link copied! 🎉');
    });
  }
}
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}
function showError(){
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('errorScreen').style.display = 'flex';
}
</script>
</body>
</html>
