<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Event Page</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#f5f6fa;min-height:100vh;display:flex;align-items:center;justify-content:center}
.loading{text-align:center;padding:40px 20px}
.spinner{width:48px;height:48px;border:4px solid #e8edf5;border-top:4px solid #4f46e5;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading h2{font-size:18px;font-weight:800;color:#1e2235;margin-bottom:6px}
.loading p{font-size:14px;color:#8a93a8;font-weight:600}
.error{text-align:center;padding:40px 20px}
.error-icon{font-size:48px;margin-bottom:12px}
.error h2{font-size:18px;font-weight:800;color:#1e2235;margin-bottom:6px}
.error p{font-size:13px;color:#8a93a8;font-weight:600}
</style>
</head>
<body>
<div class="loading" id="loading">
  <div class="spinner"></div>
  <h2>Loading Event...</h2>
  <p>Please wait while we fetch the event details.</p>
</div>
<div class="error" id="error" style="display:none">
  <div class="error-icon">🔍</div>
  <h2>Event Not Found</h2>
  <p>This QR code may be invalid or the event has been removed.</p>
</div>

<script>
(function(){
  var SUPABASE_URL = 'https://huuamwhzydfhqziniqnf.supabase.co';
  var BUCKET = 'event-pages';

  var params = new URLSearchParams(window.location.search);
  var slug = params.get('id');

  if(!slug){
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    return;
  }

  // Direct redirect to Supabase public HTML
  var pageUrl = SUPABASE_URL + '/storage/v1/object/public/' + BUCKET + '/events/' + slug + '/index.html';
  window.location.href = pageUrl;
})();
</script>
</body>
</html>
