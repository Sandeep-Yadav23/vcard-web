<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Loading…</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#3B7DD8;--fg:#1e2235;--fg2:#5a6480;--bg:#f5f7fc;--white:#fff;--r:14px}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh}
.page{max-width:480px;margin:0 auto;padding-bottom:40px}

/* hero */
.hero{background:var(--blue);padding:36px 24px 28px;text-align:center;color:#fff}
.hero-icon{width:72px;height:72px;background:rgba(255,255,255,0.18);border-radius:20px;
  display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:36px}
.hero h1{font-size:22px;font-weight:900;line-height:1.3}
.hero .tag{display:inline-block;margin-top:10px;padding:4px 14px;
  background:rgba(255,255,255,0.20);border-radius:20px;font-size:12px;font-weight:700}

/* meta chips */
.meta{display:flex;flex-wrap:wrap;gap:8px;padding:20px 20px 0}
.chip{background:var(--white);border:1.5px solid #e8edf5;border-radius:20px;
  padding:6px 14px;font-size:12px;font-weight:700;color:var(--fg2)}
.chip span{color:var(--fg)}

/* description */
.desc-box{margin:16px 20px 0;padding:16px;background:var(--white);
  border-radius:var(--r);border:1.5px solid #e8edf5}
.desc-box p{font-size:14px;color:var(--fg2);line-height:1.7;font-weight:600}

/* download button */
.dl-wrap{padding:20px 20px 0}
.dl-btn{display:flex;align-items:center;justify-content:center;gap:10px;
  background:var(--blue);color:#fff;padding:16px;border-radius:var(--r);
  text-decoration:none;font-size:16px;font-weight:800;
  box-shadow:0 4px 20px rgba(59,125,216,0.30)}
.dl-btn:hover{opacity:.9}

/* pdf preview */
.preview-wrap{margin:20px 20px 0}
.preview-wrap h3{font-size:13px;font-weight:800;color:var(--fg2);
  letter-spacing:.9px;margin-bottom:10px}
.pdf-frame{width:100%;height:480px;border-radius:var(--r);
  border:1.5px solid #e8edf5;background:var(--white)}

/* loader */
.loader{text-align:center;padding:80px 20px;color:var(--fg2);font-size:15px;font-weight:700}
.spinner{width:36px;height:36px;border:4px solid #e8edf5;
  border-top-color:var(--blue);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="page">
  <div id="root"><div class="loader"><div class="spinner"></div>Loading…</div></div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  // 🔴 Replace with your Supabase project values
  const SUPABASE_URL  = 'https://YOUR_PROJECT.supabase.co';
  const SUPABASE_ANON = 'YOUR_ANON_KEY';

  const db  = createClient(SUPABASE_URL, SUPABASE_ANON);
  const id  = new URLSearchParams(location.search).get('id');
  const root = document.getElementById('root');

  if (!id) { root.innerHTML = '<div class="loader">Invalid link.</div>'; }
  else { load(id); }

  async function load(slug) {
    const { data, error } = await db
      .from('pdf_qr_pages')
      .select('*')
      .eq('slug', slug)
      .single();

    if (error || !data) {
      root.innerHTML = '<div class="loader">Page not found.</div>';
      return;
    }

    const c = data.theme_color || '#3B7DD8';
    document.title = data.title;

    root.innerHTML = `
      <div class="hero" style="background:${c}">
        <div class="hero-icon">📄</div>
        <h1>${esc(data.title)}</h1>
        <span class="tag">${esc(data.category || 'Document')}</span>
      </div>

      <div class="meta">
        ${data.author    ? `<div class="chip">✍️ Author <span>${esc(data.author)}</span></div>`    : ''}
        ${data.file_name ? `<div class="chip">📎 File <span>${esc(data.file_name)}</span></div>`   : ''}
        ${data.file_size ? `<div class="chip">💾 Size <span>${fmt(data.file_size)}</span></div>`   : ''}
      </div>

      ${data.description ? `
      <div class="desc-box">
        <p>${esc(data.description)}</p>
      </div>` : ''}

      <div class="dl-wrap">
        <a class="dl-btn" href="${data.file_url}" target="_blank" download>
          ⬇️ Download PDF
        </a>
      </div>

      <div class="preview-wrap">
        <h3>PREVIEW</h3>
        <iframe class="pdf-frame" src="${data.file_url}" title="PDF Preview"></iframe>
      </div>
    `;
  }

  function esc(s='') {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmt(bytes) {
    if (bytes < 1024) return bytes+'B';
    if (bytes < 1048576) return (bytes/1024).toFixed(1)+'KB';
    return (bytes/1048576).toFixed(1)+'MB';
  }
</script>
</body>
</html>
