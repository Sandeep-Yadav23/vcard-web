<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rate Us</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --p:   #0090e3;
      --s:   #e37b00;
      --bg:  #08080f;
      --c1:  #111118;
      --c2:  #18181f;
      --txt: #f0f0f5;
      --mut: #666677;
      --ln:  rgba(255,255,255,0.06);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg); color: var(--txt);
      min-height: 100vh; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      opacity: 0.5;
    }

    @keyframes spin    { to{transform:rotate(360deg)} }
    @keyframes pulse   { 0%,100%{opacity:.35}50%{opacity:1} }
    @keyframes fadeUp  { from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)} }
    @keyframes scaleIn { from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)} }
    @keyframes float   { 0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)} }
    @keyframes glow    { 0%,100%{box-shadow:0 8px 32px rgba(0,144,227,.22)}50%{box-shadow:0 8px 48px rgba(0,144,227,.48),0 0 80px rgba(227,123,0,.1)} }
    @keyframes pop     { 0%{transform:scale(1)}50%{transform:scale(1.22)}100%{transform:scale(1)} }

    /* SPLASH */
    #splash {
      position: fixed; inset: 0; z-index: 999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 22px;
      background: var(--bg);
    }
    .sp-ring { position: relative; width: 76px; height: 76px; }
    .sp-ring::before {
      content:''; position:absolute; inset:0; border-radius:50%;
      border:2px solid transparent;
      border-top-color:var(--p); border-right-color:var(--s);
      animation:spin .9s linear infinite;
    }
    .sp-ring::after {
      content:''; position:absolute; inset:10px; border-radius:50%;
      border:1px solid rgba(0,144,227,.18);
    }
    #sp-icon { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:26px; }
    #sp-logo-wrap {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width:42px; height:42px; border-radius:10px; overflow:hidden; display:none;
    }
    #sp-logo-wrap img { width:100%; height:100%; object-fit:contain; }
    .sp-label {
      font-size:10px; font-weight:500; letter-spacing:3px;
      text-transform:uppercase; color:var(--mut);
      animation:pulse 1.5s ease-in-out infinite;
    }

    /* ERROR */
    #error-page {
      display:none; flex-direction:column;
      align-items:center; justify-content:center;
      min-height:100vh; padding:40px 24px; text-align:center; position:relative; z-index:1;
    }
    .err-orb {
      width:110px; height:110px; border-radius:50%;
      background:radial-gradient(circle,rgba(0,144,227,.12),transparent 70%);
      display:flex; align-items:center; justify-content:center;
      font-size:48px; margin-bottom:24px;
      animation:float 3s ease-in-out infinite;
    }
    .err-title { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:700; margin-bottom:10px; }
    .err-msg   { font-size:14px; color:var(--mut); line-height:1.7; font-weight:300; }

    /* CONTENT */
    #content {
      display:none; position:relative; z-index:1;
      max-width:480px; margin:0 auto; padding-bottom:80px;
    }

    /* HERO */
    .hero {
      position:relative; width:100%; height:250px; overflow:hidden;
      background:linear-gradient(135deg,#080d1a,#0a0a1c);
    }
    .hero-img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; opacity:.6; }
    .hero-grad {
      position:absolute; inset:0;
      background:linear-gradient(180deg,rgba(8,8,15,0) 0%,rgba(8,8,15,.25) 40%,rgba(8,8,15,.97) 100%);
    }
    .hero-glow {
      position:absolute; inset:0;
      background:radial-gradient(ellipse at 70% 20%,rgba(0,144,227,.2) 0%,transparent 60%);
    }
    .orb {
      position:absolute; border-radius:50%; pointer-events:none; filter:blur(48px);
    }
    .orb1 { width:200px; height:200px; top:-70px; right:-50px; background:radial-gradient(circle,rgba(0,144,227,.26),transparent); animation:float 7s ease-in-out infinite; }
    .orb2 { width:130px; height:130px; bottom:10px; left:-30px; background:radial-gradient(circle,rgba(227,123,0,.2),transparent); animation:float 9s ease-in-out infinite reverse; }
    .logo-wrap {
      position:absolute; bottom:-30px; left:22px;
      width:60px; height:60px; border-radius:16px;
      background:var(--c2);
      display:flex; align-items:center; justify-content:center; font-size:24px;
      box-shadow:0 8px 32px rgba(0,0,0,.55); overflow:hidden;
      animation:scaleIn .5s ease both; animation-delay:.4s;
    }
    .logo-wrap::before {
      content:''; position:absolute; inset:-1px; border-radius:17px;
      background:linear-gradient(135deg,var(--p),var(--s)); z-index:-1; opacity:.5;
    }
    .logo-wrap img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }

    /* HEADER */
    .hdr { padding:46px 22px 0; animation:fadeUp .5s ease both; animation-delay:.25s; }
    .co-name {
      font-family:'Cormorant Garamond',serif;
      font-size:22px; font-weight:700; margin-bottom:4px;
    }
    .co-website {
      font-size:12px; color:var(--mut); font-weight:400;
    }
    .co-website a { color:var(--p); text-decoration:none; }

    /* RATING CARD */
    .r-wrap {
      margin:20px 14px 0; position:relative;
      animation:fadeUp .5s ease both; animation-delay:.4s;
    }
    .r-border {
      position:absolute; inset:-1px; border-radius:26px;
      background:linear-gradient(90deg,
        rgba(0,144,227,.65),rgba(227,123,0,.65),
        rgba(0,144,227,.2),rgba(227,123,0,.65));
      background-size:300% 300%;
      animation:bdAnim 4s ease infinite; z-index:0;
    }
    @keyframes bdAnim { 0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%} }
    .r-card { position:relative; z-index:1; background:var(--c1); border-radius:25px; overflow:hidden; }

    .r-top {
      padding:26px 24px 22px; position:relative; overflow:hidden;
      background:linear-gradient(135deg,rgba(0,144,227,.09) 0%,rgba(227,123,0,.04) 100%);
    }
    .r-top-glow {
      position:absolute; inset:0;
      background:radial-gradient(ellipse at 100% 0%,rgba(0,144,227,.14) 0%,transparent 60%);
      pointer-events:none;
    }
    .r-tag {
      display:inline-flex; align-items:center; gap:6px;
      font-size:9px; font-weight:700; letter-spacing:2.5px;
      text-transform:uppercase; color:var(--p); margin-bottom:10px;
    }
    .r-tag-dot { width:4px; height:4px; border-radius:50%; background:var(--p); }
    .r-question {
      font-family:'Cormorant Garamond',serif;
      font-size:28px; font-weight:700; line-height:1.15;
      background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,.72) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }

    /* perf */
    .perf { position:relative; }
    .perf::before,.perf::after {
      content:''; position:absolute; top:50%; transform:translateY(-50%);
      width:24px; height:24px; border-radius:50%; background:var(--bg); z-index:2;
    }
    .perf::before { left:-12px; }
    .perf::after  { right:-12px; }
    .perf-line {
      height:1px; margin:0 20px;
      background:repeating-linear-gradient(90deg,
        rgba(255,255,255,.08) 0,rgba(255,255,255,.08) 6px,
        transparent 6px,transparent 14px);
    }

    .r-bot { padding:24px 24px 28px; }

    /* ── STARS ── */
    .stars-wrap {
      display:flex; justify-content:center; gap:10px; margin-bottom:28px;
    }
    .star-btn {
      background:none; border:none; cursor:pointer; padding:4px;
      font-size:40px; line-height:1;
      transition:transform .15s;
      filter:grayscale(1) opacity(.35);
    }
    .star-btn.active { filter:none; animation:pop .25s ease; }
    .star-btn:hover  { transform:scale(1.15); filter:none; }

    /* ── THUMBS ── */
    .thumbs-wrap {
      display:flex; justify-content:center; gap:20px; margin-bottom:28px;
    }
    .thumb-btn {
      width:90px; height:90px; border-radius:20px; border:2px solid var(--ln);
      background:rgba(255,255,255,.04); cursor:pointer;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:6px; font-size:36px; transition:all .2s;
    }
    .thumb-btn span.lbl {
      font-size:11px; font-weight:600; letter-spacing:1px;
      text-transform:uppercase; color:var(--mut);
    }
    .thumb-btn.sel-up   { border-color:rgba(107,203,119,.6); background:rgba(107,203,119,.08); }
    .thumb-btn.sel-down { border-color:rgba(255,107,107,.6); background:rgba(255,107,107,.08); }
    .thumb-btn:active   { transform:scale(.93); }

    /* ── EMOJI ── */
    .emoji-wrap {
      display:flex; justify-content:center; gap:14px; margin-bottom:28px;
    }
    .emoji-btn {
      width:72px; height:80px; border-radius:16px; border:2px solid var(--ln);
      background:rgba(255,255,255,.04); cursor:pointer;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:5px; font-size:34px; transition:all .2s;
    }
    .emoji-btn span.lbl {
      font-size:10px; font-weight:600; letter-spacing:.5px;
      text-transform:uppercase; color:var(--mut);
    }
    .emoji-btn.sel { border-color:rgba(0,144,227,.6); background:rgba(0,144,227,.08); }
    .emoji-btn:active { transform:scale(.93); }

    /* Submit */
    .submit-btn {
      display:flex; align-items:center; justify-content:center; gap:10px;
      width:100%; padding:17px; border:none; border-radius:16px;
      font-family:'Outfit',sans-serif; font-size:15px; font-weight:600;
      letter-spacing:.3px; cursor:pointer; color:#fff;
      background:linear-gradient(135deg,var(--p) 0%,var(--s) 100%);
      transition:transform .15s, opacity .2s;
      animation:glow 3s ease-in-out infinite;
    }
    .submit-btn:disabled { opacity:.45; cursor:not-allowed; animation:none; }
    .submit-btn:not(:disabled):active { transform:scale(.98); }
    .submit-btn svg { width:16px; height:16px; fill:none; stroke:#fff; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }

    /* Thank you state */
    .thankyou {
      display:none; flex-direction:column;
      align-items:center; text-align:center; padding:32px 16px;
    }
    .ty-orb {
      width:90px; height:90px; border-radius:50%; margin-bottom:20px;
      background:radial-gradient(circle,rgba(107,203,119,.18),transparent 70%);
      display:flex; align-items:center; justify-content:center; font-size:44px;
      animation:float 3s ease-in-out infinite;
    }
    .ty-title {
      font-family:'Cormorant Garamond',serif;
      font-size:28px; font-weight:700; margin-bottom:8px;
    }
    .ty-msg { font-size:14px; color:var(--mut); font-weight:300; line-height:1.7; }

    /* Footer */
    .footer {
      margin-top:30px; padding:0 22px;
      display:flex; align-items:center; justify-content:center; gap:8px;
      animation:fadeUp .5s ease both; animation-delay:.65s;
    }
    .f-line { height:1px; flex:1; max-width:64px; background:linear-gradient(90deg,transparent,rgba(255,255,255,.07)); }
    .f-line.r { background:linear-gradient(90deg,rgba(255,255,255,.07),transparent); }
    .f-txt { font-size:10px; font-weight:500; letter-spacing:2.5px; text-transform:uppercase; color:rgba(255,255,255,.13); }
    .f-dot { width:3px; height:3px; border-radius:50%; background:rgba(255,255,255,.1); }
  </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-ring">
    <div id="sp-icon">⭐</div>
    <div id="sp-logo-wrap"><img src="" alt=""/></div>
  </div>
  <div class="sp-label">Loading</div>
</div>

<!-- ERROR -->
<div id="error-page">
  <div class="err-orb">⭐</div>
  <div class="err-title">Page Not Found</div>
  <div class="err-msg">This rating page is invalid or has been removed.<br/>Please contact the business for assistance.</div>
</div>

<!-- CONTENT -->
<div id="content">

  <div class="hero">
    <img id="hero-img" src="" alt="" class="hero-img" style="display:none"/>
    <div class="hero-glow"></div>
    <div class="hero-grad"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="logo-wrap" id="logo-wrap">
      <span id="logo-fb">⭐</span>
      <img id="logo-img" src="" alt="" style="display:none"/>
    </div>
  </div>

  <div class="hdr">
    <div class="co-name" id="co-name"></div>
    <div class="co-website" id="co-website" style="display:none">
      <a id="co-link" href="#" target="_blank" rel="noopener"></a>
    </div>
  </div>

  <div class="r-wrap">
    <div class="r-border"></div>
    <div class="r-card">

      <div class="r-top">
        <div class="r-top-glow"></div>
        <div class="r-tag"><div class="r-tag-dot"></div>Share Your Feedback</div>
        <div class="r-question" id="r-question">How was your experience?</div>
      </div>

      <div class="perf"><div class="perf-line"></div></div>

      <div class="r-bot">

        <!-- STARS -->
        <div class="stars-wrap" id="stars-wrap" style="display:none">
          <button class="star-btn" data-val="1" onclick="selectRating('1')">⭐</button>
          <button class="star-btn" data-val="2" onclick="selectRating('2')">⭐</button>
          <button class="star-btn" data-val="3" onclick="selectRating('3')">⭐</button>
          <button class="star-btn" data-val="4" onclick="selectRating('4')">⭐</button>
          <button class="star-btn" data-val="5" onclick="selectRating('5')">⭐</button>
        </div>

        <!-- THUMBS -->
        <div class="thumbs-wrap" id="thumbs-wrap" style="display:none">
          <button class="thumb-btn" id="thumb-up" onclick="selectRating('up')">
            👍<span class="lbl">Good</span>
          </button>
          <button class="thumb-btn" id="thumb-down" onclick="selectRating('down')">
            👎<span class="lbl">Bad</span>
          </button>
        </div>

        <!-- EMOJI -->
        <div class="emoji-wrap" id="emoji-wrap" style="display:none">
          <button class="emoji-btn" data-val="bad"     onclick="selectRating('bad')">😞<span class="lbl">Bad</span></button>
          <button class="emoji-btn" data-val="neutral" onclick="selectRating('neutral')">😐<span class="lbl">Okay</span></button>
          <button class="emoji-btn" data-val="good"    onclick="selectRating('good')">😊<span class="lbl">Good</span></button>
          <button class="emoji-btn" data-val="great"   onclick="selectRating('great')">😄<span class="lbl">Great</span></button>
        </div>

        <!-- Thank you -->
        <div class="thankyou" id="thankyou">
          <div class="ty-orb">🎉</div>
          <div class="ty-title">Thank You!</div>
          <div class="ty-msg">Your feedback means the world to us.<br/>We appreciate you taking the time.</div>
        </div>

        <!-- Submit -->
        <button class="submit-btn" id="submit-btn" onclick="submitRating()" disabled>
          Submit Feedback
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>

      </div>
    </div>
  </div>

  <div class="footer">
    <div class="f-line"></div>
    <div class="f-dot"></div>
    <div class="f-txt">QRPulse</div>
    <div class="f-dot"></div>
    <div class="f-line r"></div>
  </div>

</div>

<script>
  const SUPA_URL = 'https://huuamwhzydfhqziniqnf.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1dWFtd2h6eWRmaHF6aW5pcW5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MjAxOTUsImV4cCI6MjA4OTQ5NjE5NX0.-tTpabRI1b4enlUp8uIXMwmgGv2CLdFgE3vBk01Ye3Y';

  const slug = new URLSearchParams(location.search).get('id');
  let _pageId = null;
  let _selectedVal = null;
  let _ratingType = 'stars';

  async function loadPage() {
    if (!slug) { showError(); return; }
    try {
      const res = await fetch(
        `${SUPA_URL}/rest/v1/rating_pages?slug=eq.${encodeURIComponent(slug)}&select=*&limit=1`,
        { headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` } }
      );
      if (!res.ok) { showError(); return; }
      const rows = await res.json();
      if (!rows?.length) { showError(); return; }
      render(rows[0]);
    } catch(e) { console.error(e); showError(); }
  }

  function render(d) {
    _pageId     = d.id;
    _ratingType = d.rating_type || 'stars';

    // Colors
    if (d.primary_color) {
      document.documentElement.style.setProperty('--p', d.primary_color);
      document.documentElement.style.setProperty('--s', d.button_color || d.primary_color);
    }

    // Splash logo
    if (d.logo_url) {
      document.getElementById('sp-logo-wrap').style.display = 'block';
      document.getElementById('sp-logo-wrap').querySelector('img').src = d.logo_url;
      document.getElementById('sp-icon').style.display = 'none';
    }

    // Hero
    if (d.banner_url) {
      const hi = document.getElementById('hero-img');
      hi.src = d.banner_url; hi.style.display = 'block';
    }

    // Logo
    if (d.logo_url) {
      const li = document.getElementById('logo-img');
      li.src = d.logo_url; li.style.display = 'block';
      document.getElementById('logo-fb').style.display = 'none';
    }

    // Company
    document.getElementById('co-name').textContent = d.company || '';
    if (d.website) {
      const wb = document.getElementById('co-website');
      const lk = document.getElementById('co-link');
      const dom = d.website.replace(/^https?:\/\//,'').split('/')[0];
      lk.textContent = dom;
      lk.href = d.website.startsWith('http') ? d.website : 'https://'+d.website;
      wb.style.display = 'block';
    }

    // Question
    document.getElementById('r-question').textContent =
      d.question || 'How was your experience?';

    // Rating type
    if (_ratingType === 'stars')  document.getElementById('stars-wrap').style.display  = 'flex';
    if (_ratingType === 'thumbs') document.getElementById('thumbs-wrap').style.display = 'flex';
    if (_ratingType === 'emoji')  document.getElementById('emoji-wrap').style.display  = 'flex';

    document.title = `Rate Us — ${d.company || 'QRPulse'}`;
    setTimeout(showContent, 1100);
  }

  function selectRating(val) {
    _selectedVal = val;
    document.getElementById('submit-btn').disabled = false;

    if (_ratingType === 'stars') {
      document.querySelectorAll('.star-btn').forEach(b => {
        b.classList.toggle('active', parseInt(b.dataset.val) <= parseInt(val));
      });
    } else if (_ratingType === 'thumbs') {
      document.getElementById('thumb-up').classList.toggle('sel-up', val === 'up');
      document.getElementById('thumb-down').classList.toggle('sel-down', val === 'down');
      document.getElementById('thumb-up').classList.toggle('sel-up', false);
      document.getElementById('thumb-down').classList.toggle('sel-down', false);
      if (val === 'up')   document.getElementById('thumb-up').classList.add('sel-up');
      if (val === 'down') document.getElementById('thumb-down').classList.add('sel-down');
    } else if (_ratingType === 'emoji') {
      document.querySelectorAll('.emoji-btn').forEach(b => {
        b.classList.toggle('sel', b.dataset.val === val);
      });
    }
  }

  async function submitRating() {
    if (!_selectedVal || !_pageId) return;

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Submitting…';

    try {
      await fetch(`${SUPA_URL}/rest/v1/rating_submissions`, {
        method: 'POST',
        headers: {
          'apikey': SUPA_KEY,
          'Authorization': `Bearer ${SUPA_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ page_id: _pageId, rating_value: _selectedVal })
      });

      // Show thank you
      if (_ratingType === 'stars')  document.getElementById('stars-wrap').style.display  = 'none';
      if (_ratingType === 'thumbs') document.getElementById('thumbs-wrap').style.display = 'none';
      if (_ratingType === 'emoji')  document.getElementById('emoji-wrap').style.display  = 'none';
      btn.style.display = 'none';
      document.getElementById('thankyou').style.display = 'flex';

    } catch(e) {
      console.error(e);
      btn.disabled = false;
      btn.innerHTML = 'Submit Feedback <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
    }
  }

  function showContent() {
    const sp = document.getElementById('splash');
    sp.style.transition = 'opacity .5s ease';
    sp.style.opacity = '0';
    setTimeout(() => {
      sp.style.display = 'none';
      document.getElementById('content').style.display = 'block';
    }, 500);
  }

  function showError() {
    document.getElementById('splash').style.display    = 'none';
    document.getElementById('error-page').style.display = 'flex';
  }

  loadPage();
</script>
</body>
</html>
