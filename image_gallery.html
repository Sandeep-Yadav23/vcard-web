<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1,user-scalable=yes"/>
<meta name="theme-color" id="theme-meta" content="#5B4FCF"/>
<title id="page-title">Pulse Gallery · Interactive UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet"/>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg: #5B4FCF;
  --accent: #5B4FCF;
  --bg-soft: color-mix(in srgb, var(--bg) 12%, #f5f3ff);
  --surface: #f8f9fe;
  --card: #ffffff;
  --fg: #111827;
  --fg-muted: #4b5563;
  --border-light: #eef2ff;
  --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.03), 0 2px 6px rgba(0, 0, 0, 0.05);
  --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.08);
  --radius-xl: 28px;
  --radius-lg: 20px;
  --radius-md: 16px;
  --transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--surface);
  color: var(--fg);
  overflow-x: hidden;
  line-height: 1.5;
}

/* modern loader */
#loader {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10000;
  transition: opacity 0.5s ease, visibility 0.5s;
  backdrop-filter: blur(2px);
}
#loader.hide {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.loader-ring {
  width: 48px;
  height: 48px;
  border: 3px solid rgba(255, 255, 255, 0.25);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text {
  color: rgba(255,255,255,0.9);
  font-weight: 500;
  font-size: 0.9rem;
  margin-top: 18px;
  letter-spacing: -0.2px;
}

/* header premium */
.header {
  background: var(--bg);
  padding: 48px 24px 56px;
  position: relative;
  border-bottom-left-radius: var(--radius-xl);
  border-bottom-right-radius: var(--radius-xl);
  box-shadow: var(--shadow-md);
}
.header-wave {
  position: absolute;
  bottom: -3px;
  left: 0;
  width: 100%;
  height: 28px;
  background: var(--surface);
  border-radius: 28px 28px 0 0;
}
.header-content {
  max-width: 560px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
}
.badge-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(4px);
  padding: 6px 14px;
  border-radius: 60px;
  color: white;
  font-size: 0.8rem;
  font-weight: 500;
  margin-bottom: 20px;
  cursor: pointer;
  transition: background 0.2s;
  width: fit-content;
}
.badge-back:hover {
  background: rgba(255,255,255,0.25);
}
.header h1 {
  color: white;
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 10px;
  line-height: 1.2;
}
.header p {
  color: rgba(255,255,255,0.85);
  font-size: 0.95rem;
  max-width: 440px;
  margin-bottom: 16px;
}
.count-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(4px);
  border-radius: 40px;
  padding: 6px 16px;
  font-size: 0.8rem;
  font-weight: 600;
  color: white;
}

/* main container */
.main {
  max-width: 600px;
  margin: 0 auto;
  padding: 28px 20px 56px;
}

/* layout switcher (interactive UI) */
.layout-switch {
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  margin-bottom: 24px;
}
.layout-btn {
  background: transparent;
  border: 1px solid var(--border-light);
  background: white;
  padding: 8px 18px;
  border-radius: 60px;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--fg-muted);
  cursor: pointer;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  backdrop-filter: blur(2px);
}
.layout-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  box-shadow: 0 4px 12px color-mix(in srgb, var(--accent) 30%, transparent);
}
.layout-btn:hover:not(.active) {
  background: #f0f2fe;
  transform: translateY(-1px);
}

/* GRID UI — clean, crisp, interactive */
.img-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  border-radius: var(--radius-lg);
}
.grid-item {
  aspect-ratio: 1 / 1;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  background: #eef2ff;
  box-shadow: 0 2px 6px rgba(0,0,0,0.02);
  transition: transform 0.2s ease, box-shadow 0.2s;
}
.grid-item:hover {
  transform: scale(1.02);
  box-shadow: 0 12px 24px rgba(0,0,0,0.1);
}
.grid-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}
.grid-item:hover img {
  transform: scale(1.08);
}

/* SLIDESHOW — immersive */
.slideshow-container {
  background: #0c0c12;
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-md);
}
.slideshow-view {
  aspect-ratio: 4 / 3;
  position: relative;
  background: #0a0a10;
}
.slide {
  display: none;
  width: 100%;
  height: 100%;
  align-items: center;
  justify-content: center;
}
.slide.active {
  display: flex;
  animation: fadeSlide 0.3s ease-out;
}
@keyframes fadeSlide {
  from { opacity: 0; transform: scale(0.98); }
  to { opacity: 1; transform: scale(1); }
}
.slide img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  cursor: zoom-in;
  transition: opacity 0.2s;
}
.slide-controls-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  background: rgba(20,20,28,0.7);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(255,255,255,0.08);
}
.slide-btn {
  width: 44px;
  height: 44px;
  border-radius: 60px;
  background: rgba(255,255,255,0.12);
  border: none;
  color: white;
  font-size: 26px;
  font-weight: 400;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.slide-btn:hover {
  background: var(--accent);
  transform: scale(1.02);
}
.dots {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  flex: 1;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 10px;
  background: rgba(255,255,255,0.4);
  transition: all 0.2s ease;
  cursor: pointer;
}
.dot.active {
  width: 24px;
  background: var(--accent);
}
.slide-num {
  font-size: 0.8rem;
  font-weight: 500;
  background: rgba(0,0,0,0.5);
  padding: 4px 12px;
  border-radius: 40px;
  color: #ddd;
  min-width: 70px;
  text-align: center;
}

/* modern lightbox (glassmorph) - SAVE BUTTON REMOVED */
.lb-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(8, 8, 16, 0.96);
  backdrop-filter: blur(16px);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  transition: opacity 0.2s;
}
.lb-overlay.open {
  display: flex;
}
.lb-close {
  position: fixed;
  top: 20px;
  right: 24px;
  width: 48px;
  height: 48px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  color: white;
  cursor: pointer;
  transition: 0.2s;
  z-index: 2002;
}
.lb-close:hover {
  background: rgba(255,255,255,0.25);
  transform: rotate(90deg);
}
.lb-content {
  position: relative;
  max-width: 90vw;
  max-height: 85vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.lb-img {
  display: none;
  max-width: 100%;
  max-height: 85vh;
  border-radius: 24px;
  object-fit: contain;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}
.lb-img.active {
  display: block;
  animation: lbFade 0.25s;
}
@keyframes lbFade {
  from { opacity: 0; transform: scale(0.96); }
  to { opacity: 1; transform: scale(1); }
}
.lb-arrow {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);
  border: none;
  width: 52px;
  height: 52px;
  border-radius: 60px;
  font-size: 30px;
  color: white;
  cursor: pointer;
  transition: 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.lb-arrow:hover {
  background: var(--accent);
  transform: translateY(-50%) scale(1.05);
}
.lb-prev { left: 18px; }
.lb-next { right: 18px; }
.lb-counter {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  padding: 8px 20px;
  border-radius: 60px;
  font-size: 0.85rem;
  font-weight: 500;
  color: white;
  letter-spacing: 0.3px;
}

/* CTA card */
.cta-card {
  margin-top: 32px;
  background: white;
  border-radius: var(--radius-lg);
  padding: 4px;
  box-shadow: var(--shadow-sm);
  transition: 0.2s;
}
.cta-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: var(--accent);
  border-radius: 60px;
  padding: 16px 20px;
  color: white;
  font-weight: 700;
  font-size: 1rem;
  text-decoration: none;
  transition: all 0.2s ease;
  border: none;
  width: 100%;
  cursor: pointer;
}
.cta-btn:hover {
  filter: brightness(1.05);
  transform: translateY(-2px);
  box-shadow: 0 12px 20px color-mix(in srgb, var(--accent) 35%, transparent);
}

/* empty & error */
.empty-state {
  text-align: center;
  padding: 64px 24px;
  background: white;
  border-radius: var(--radius-lg);
}
.empty-icon {
  font-size: 56px;
  margin-bottom: 18px;
  opacity: 0.6;
}
#error-state {
  display: none;
  text-align: center;
  max-width: 400px;
  margin: 80px auto;
  padding: 40px;
  background: white;
  border-radius: 32px;
  box-shadow: var(--shadow-sm);
}

footer {
  text-align: center;
  padding: 32px 20px 24px;
  font-size: 0.75rem;
  color: #6c7293;
}
footer a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
}

@media (max-width: 500px) {
  .header h1 { font-size: 1.65rem; }
  .img-grid { gap: 6px; }
  .layout-btn { padding: 6px 14px; font-size: 0.75rem; }
  .lb-arrow { width: 44px; height: 44px; font-size: 26px; }
}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">loading gallery ✨</div>
</div>

<div class="header" id="header">
  <div class="header-content">
    <div class="badge-back" id="backBtn" style="display: none;">← Back to overview</div>
    <h1 id="h-title">Image Gallery</h1>
    <p id="h-desc" style="display: none;"></p>
    <div class="count-pill">
      <span>📸</span> <span id="img-count">0 images</span>
    </div>
  </div>
  <div class="header-wave"></div>
</div>

<div class="main" id="main-content" style="display: none;">
  <div class="layout-switch" id="layoutSwitch">
    <button class="layout-btn" id="gridLayoutBtn">📷 Grid</button>
    <button class="layout-btn" id="slideshowLayoutBtn">🎬 Slideshow</button>
  </div>
  <div id="dynamic-view"></div>
  <div id="cta-wrap"></div>
</div>

<div id="error-state">
  <div class="empty-icon">⚠️</div>
  <h2>Gallery not found</h2>
  <p>This link may have expired or been removed.</p>
</div>

<div class="lb-overlay" id="lightbox">
  <div class="lb-close" id="lbCloseBtn">✕</div>
  <div class="lb-content" id="lb-content"></div>
  <button class="lb-arrow lb-prev" id="lbPrevBtn">‹</button>
  <button class="lb-arrow lb-next" id="lbNextBtn">›</button>
  <div class="lb-counter" id="lb-counter">0 / 0</div>
  <!-- SAVE BUTTON REMOVED -->
</div>

<footer>
  ✦ Powered by <a href="#">QRPulse</a> · <span id="footer-name"></span>
</footer>

<script>
// SUPABASE CONFIG (same as original, kept fully functional)
const SUPABASE_URL = 'https://huuamwhzydfhqziniqnf.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1dWFtd2h6eWRmaHF6aW5pcW5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MjAxOTUsImV4cCI6MjA4OTQ5NjE5NX0.-tTpabRI1b4enlUp8uIXMwmgGv2CLdFgE3vBk01Ye3Y';

let images = [];
let currentLbIndex = 0;
let currentSlideIndex = 0;
let pageConfig = {};
let activeLayout = 'grid';   // 'grid' or 'slideshow'
let slideshowImagesLoaded = false;

// helpers
function getSlug() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('id')) return params.get('id');
  if (params.get('slug')) return params.get('slug');
  const path = window.location.pathname;
  const parts = path.split('/').filter(Boolean);
  if (parts.length >= 2 && parts[0] === 'qr') return parts[1];
  if (parts.length >= 1) return parts[parts.length-1];
  return null;
}

async function fetchConfig(slug) {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/image_qr_pages?slug=eq.' + encodeURIComponent(slug) + '&select=*&limit=1', {
      headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON }
    });
    if (!res.ok) return null;
    const rows = await res.json();
    return rows && rows.length ? rows[0] : null;
  } catch(e) { return null; }
}

async function trackScan(slug) {
  try {
    await fetch(SUPABASE_URL + '/rest/v1/rpc/increment_scan_count', {
      method: 'POST', headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON, 'Content-Type': 'application/json' },
      body: JSON.stringify({ p_slug: slug })
    });
    await fetch(SUPABASE_URL + '/rest/v1/image_qr_scans', {
      method: 'POST', headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({ page_slug: slug, user_agent: navigator.userAgent })
    });
  } catch(e) {}
}

function applyTheme(cfg) {
  if (cfg.bg_color) document.documentElement.style.setProperty('--bg', cfg.bg_color);
  if (cfg.accent_color) document.documentElement.style.setProperty('--accent', cfg.accent_color);
  const meta = document.getElementById('theme-meta');
  if (meta) meta.content = cfg.bg_color || '#5B4FCF';
}

function showError() {
  document.getElementById('error-state').style.display = 'block';
  document.getElementById('main-content').style.display = 'none';
}
function hideLoader() {
  const loader = document.getElementById('loader');
  loader.classList.add('hide');
  setTimeout(() => loader.style.display = 'none', 500);
}

// ========== RENDER GRID (clean interactive) ==========
function renderGrid() {
  const container = document.getElementById('dynamic-view');
  if (!container) return;
  container.innerHTML = `<div class="img-grid" id="imgGrid"></div>`;
  const grid = document.getElementById('imgGrid');
  grid.innerHTML = '';
  images.forEach((url, idx) => {
    const item = document.createElement('div');
    item.className = 'grid-item';
    const img = document.createElement('img');
    img.src = url;
    img.alt = `Gallery ${idx+1}`;
    img.loading = 'lazy';
    item.appendChild(img);
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      openLightbox(idx);
    });
    grid.appendChild(item);
  });
}

// ========== RENDER SLIDESHOW (enhanced) ==========
function renderSlideshow() {
  const container = document.getElementById('dynamic-view');
  if (!container) return;
  container.innerHTML = `
    <div class="slideshow-container">
      <div class="slideshow-view" id="slideshowView"></div>
      <div class="slide-controls-bar">
        <button class="slide-btn" id="slidePrevBtn">‹</button>
        <div class="dots" id="dotsContainer"></div>
        <div class="slide-num" id="slideNumDisplay">1 / ${images.length}</div>
        <button class="slide-btn" id="slideNextBtn">›</button>
      </div>
    </div>
  `;
  const slideshowView = document.getElementById('slideshowView');
  slideshowView.innerHTML = '';
  images.forEach((url, i) => {
    const slideDiv = document.createElement('div');
    slideDiv.className = `slide ${i === currentSlideIndex ? 'active' : ''}`;
    const imgEl = document.createElement('img');
    imgEl.src = url;
    imgEl.alt = `slide ${i+1}`;
    imgEl.loading = i === currentSlideIndex ? 'eager' : 'lazy';
    imgEl.style.cursor = 'zoom-in';
    imgEl.addEventListener('click', () => openLightbox(i));
    slideDiv.appendChild(imgEl);
    slideshowView.appendChild(slideDiv);
  });
  // rebuild dots
  const dotsContainer = document.getElementById('dotsContainer');
  dotsContainer.innerHTML = '';
  images.forEach((_, idx) => {
    const dot = document.createElement('div');
    dot.className = `dot ${idx === currentSlideIndex ? 'active' : ''}`;
    dot.addEventListener('click', () => goToSlide(idx));
    dotsContainer.appendChild(dot);
  });
  updateSlideNumber();

  document.getElementById('slidePrevBtn').addEventListener('click', () => changeSlide(-1));
  document.getElementById('slideNextBtn').addEventListener('click', () => changeSlide(1));
}

function changeSlide(delta) {
  let newIdx = currentSlideIndex + delta;
  if (newIdx < 0) newIdx = images.length - 1;
  if (newIdx >= images.length) newIdx = 0;
  goToSlide(newIdx);
}

function goToSlide(idx) {
  if (!images.length) return;
  const slides = document.querySelectorAll('.slide');
  const dots = document.querySelectorAll('.dot');
  if (!slides.length) return;
  slides.forEach((s, i) => s.classList.toggle('active', i === idx));
  if (dots.length) dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  currentSlideIndex = idx;
  updateSlideNumber();
}

function updateSlideNumber() {
  const numEl = document.getElementById('slideNumDisplay');
  if (numEl) numEl.innerText = `${currentSlideIndex+1} / ${images.length}`;
}

// ========== LIGHTBOX with gesture (SAVE BUTTON REMOVED) ==========
function buildLightboxContent() {
  const lbContent = document.getElementById('lb-content');
  lbContent.innerHTML = '';
  images.forEach((url, i) => {
    const img = document.createElement('img');
    img.className = `lb-img ${i === 0 ? 'active' : ''}`;
    img.src = url;
    img.dataset.url = url;
    img.alt = `full ${i+1}`;
    lbContent.appendChild(img);
  });
}

function openLightbox(index) {
  if (!images.length) return;
  currentLbIndex = index;
  updateLightboxImages();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function lbNavigate(delta) {
  currentLbIndex = (currentLbIndex + delta + images.length) % images.length;
  updateLightboxImages();
}
function updateLightboxImages() {
  const imgs = document.querySelectorAll('.lb-img');
  imgs.forEach((img, idx) => img.classList.toggle('active', idx === currentLbIndex));
  const counter = document.getElementById('lb-counter');
  if (counter) counter.innerText = `${currentLbIndex+1} / ${images.length}`;
}
// downloadCurrentLightbox function completely removed

// ========== LAYOUT SWITCH ==========
function setActiveLayout(layout) {
  activeLayout = layout;
  if (layout === 'grid') {
    renderGrid();
    document.getElementById('gridLayoutBtn').classList.add('active');
    document.getElementById('slideshowLayoutBtn').classList.remove('active');
  } else {
    renderSlideshow();
    document.getElementById('slideshowLayoutBtn').classList.add('active');
    document.getElementById('gridLayoutBtn').classList.remove('active');
  }
}

// ========== MAIN PAGE RENDER ==========
function renderPage(cfg) {
  const title = cfg.page_title || 'Image Gallery';
  document.title = title;
  document.getElementById('h-title').innerText = title;
  document.getElementById('footer-name').innerText = cfg.qr_name || 'Gallery';

  if (cfg.description) {
    const descEl = document.getElementById('h-desc');
    descEl.innerText = cfg.description;
    descEl.style.display = 'block';
  }
  const imgCount = images.length;
  document.getElementById('img-count').innerText = `${imgCount} ${imgCount === 1 ? 'image' : 'images'}`;
  
  document.getElementById('main-content').style.display = 'block';
  document.getElementById('error-state').style.display = 'none';
  
  if (!images.length) {
    document.getElementById('dynamic-view').innerHTML = `<div class="empty-state"><div class="empty-icon">🖼️</div><h3>No images yet</h3><p style="margin-top: 6px;">Add photos to see the gallery</p></div>`;
    document.getElementById('cta-wrap').innerHTML = '';
    return;
  }
  
  // layout switcher visibility
  const switchDiv = document.getElementById('layoutSwitch');
  switchDiv.style.display = 'flex';
  
  // default layout from config: slideshow or grid
  const desiredLayout = (cfg.layout === 'slideshow') ? 'slideshow' : 'grid';
  setActiveLayout(desiredLayout);
  
  // cta
  if (cfg.cta_label && cfg.cta_url) {
    document.getElementById('cta-wrap').innerHTML = `
      <div class="cta-card">
        <a class="cta-btn" href="${escapeHtml(cfg.cta_url)}" target="_blank" rel="noopener">
          <span>✨</span> ${escapeHtml(cfg.cta_label)} <span>→</span>
        </a>
      </div>`;
  } else {
    document.getElementById('cta-wrap').innerHTML = '';
  }
  
  buildLightboxContent();
}

function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

// ========== INIT & SUPABASE ==========
async function init() {
  const slug = getSlug();
  if (!slug) { showError(); hideLoader(); return; }
  try {
    const data = await fetchConfig(slug);
    if (!data || !data.image_urls || !data.image_urls.length) { showError(); hideLoader(); return; }
    pageConfig = data;
    images = data.image_urls || [];
    applyTheme(data);
    renderPage(data);
    trackScan(slug);
  } catch(e) {
    console.warn(e);
    showError();
  }
  hideLoader();
}

// Event binding after dom ready
window.addEventListener('DOMContentLoaded', () => {
  init();
  setTimeout(() => {
    // attach lightbox events (no download button listener)
    const lightbox = document.getElementById('lightbox');
    document.getElementById('lbCloseBtn')?.addEventListener('click', closeLightbox);
    document.getElementById('lbPrevBtn')?.addEventListener('click', () => lbNavigate(-1));
    document.getElementById('lbNextBtn')?.addEventListener('click', () => lbNavigate(1));
    lightbox?.addEventListener('click', (e) => { if(e.target === lightbox) closeLightbox(); });
    
    // layout switcher
    document.getElementById('gridLayoutBtn')?.addEventListener('click', () => setActiveLayout('grid'));
    document.getElementById('slideshowLayoutBtn')?.addEventListener('click', () => setActiveLayout('slideshow'));
    
    // keyboard events
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'ArrowRight') lbNavigate(1);
      if (e.key === 'ArrowLeft') lbNavigate(-1);
      if (e.key === 'Escape') closeLightbox();
    });
    // swipe for lightbox
    let touchStartX = 0;
    lightbox?.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, {passive:true});
    lightbox?.addEventListener('touchend', (e) => {
      const diff = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(diff) > 50) lbNavigate(diff < 0 ? 1 : -1);
    });
  }, 100);
});
</script>
